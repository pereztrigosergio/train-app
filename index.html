<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Train.">
<meta name="theme-color" content="#F2F3F8">
<meta name="app-version" content="2.1">
<title>Train.</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="manifest" href="manifest.json">

<style>
html{height:100%;}
:root{
  --bg:#F2F3F8;--bg2:#FFFFFF;--bg3:#E8EAF2;
  --g:rgba(255,255,255,0.72);--g2:rgba(255,255,255,0.92);
  --bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.13);
  --t:#1C1C1E;--t2:#3C3C43;--t3:#8E8E93;--t4:rgba(0,0,0,0.25);
  --bl:#007AFF;--or:#FF6B35;--gr:#34C759;--pu:#AF52DE;--re:#FF3B30;--ye:#FF9F0A;
  --r:18px;--r2:14px;--r3:10px;
  --blur:blur(28px) saturate(180%);
  --shadow:0 2px 16px rgba(0,0,0,0.07),0 1px 4px rgba(0,0,0,0.05);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F2F3F8;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;color:var(--t)}
#app{display:flex;flex-direction:column;min-height:100vh;max-width:430px;margin:0 auto;position:relative;background:#F2F3F8}
.b1,.b2,.b3{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
.b1{width:300px;height:300px;background:rgba(0,122,255,0.07);top:-120px;left:-80px;filter:blur(90px)}
.b2{width:240px;height:240px;background:rgba(175,82,222,0.05);bottom:60px;right:-70px;filter:blur(80px)}
.b3{width:200px;height:200px;background:rgba(52,199,89,0.05);top:35%;left:30%;filter:blur(75px)}
#hd{position:relative;z-index:10;padding:calc(var(--st) + 14px) 18px 12px;background:rgba(242,243,248,0.85);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:0.5px solid var(--bd);flex-shrink:0}
.logo{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--t)}.logo span{color:var(--bl)}
.hdate{font-size:11px;color:var(--t3);margin-top:1px;text-transform:capitalize}
.wp{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
.wpn{background:rgba(0,122,255,0.1);color:var(--bl);border:0.5px solid rgba(0,122,255,0.2)}
.wpl{background:rgba(255,159,10,0.12);color:var(--ye);border:0.5px solid rgba(255,159,10,0.25)}
#cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 12px 80px;position:relative;z-index:1;-webkit-overflow-scrolling:touch;min-height:200px}
#cnt::-webkit-scrollbar{display:none}
#tb{flex-shrink:0;position:relative;z-index:10;background:rgba(242,243,248,0.88);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:0.5px solid var(--bd);display:flex;padding-bottom:var(--sb)}
.tbb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:8px 2px 9px;transition:all .2s;color:var(--t3)}
.tbb i{font-size:21px}.tbb span{font-size:10px}
.tbb.on{color:var(--bl)}.tbb.on span{font-weight:600}
.gl{background:var(--g);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:0.5px solid var(--bd);border-radius:var(--r);box-shadow:var(--shadow)}
.gls{background:var(--g2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:0.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 24px rgba(0,0,0,0.09)}
.card{padding:13px 14px;margin-bottom:9px}
.slbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;padding:0 2px}
.btn{width:100%;padding:13px;border-radius:var(--r2);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;font-family:-apple-system,sans-serif;letter-spacing:-.2px}
.btn:active{transform:scale(.97);opacity:.85}
.btnb{background:var(--bl);color:#fff}.btno{background:var(--or);color:#fff}
.btng{background:rgba(0,0,0,0.05);color:var(--t2);border:0.5px solid var(--bd)}.btny{background:var(--ye);color:#fff}
.btnr{background:rgba(255,59,48,0.1);color:var(--re);border:0.5px solid rgba(255,59,48,0.2)}
.btnai{background:linear-gradient(135deg,#007AFF,#AF52DE);color:#fff}
.exc{display:flex;align-items:flex-start;gap:9px;cursor:pointer;padding:11px 12px;margin-bottom:7px;transition:all .2s}
.exc.ok{background:rgba(52,199,89,0.07)!important;border-color:rgba(52,199,89,0.2)!important}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;transition:all .2s;color:transparent;font-size:12px}
.chk.ok{background:var(--gr);border-color:var(--gr);color:#fff}
.eil{width:48px;height:36px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.xn{font-size:13px;font-weight:600;color:var(--t);line-height:1.3}.xn.ok{color:#1a7a38}
.xr{font-size:15px;font-weight:800;white-space:nowrap;margin-left:auto;padding-left:5px}
.xt{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;display:inline-block;margin-top:4px;margin-right:3px}
.xrest{font-size:11px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:4px}
.xd{font-size:11px;color:var(--t3);margin-top:4px;line-height:1.55;display:none}.xd.v{display:block}
.xtp{font-size:11px;color:rgba(0,122,255,0.75);margin-top:3px;line-height:1.5;display:none}.xtp.v{display:block}
.pb{height:4px;background:rgba(0,0,0,0.07);border-radius:2px;overflow:hidden;margin-top:6px}
.pf{height:100%;border-radius:2px;transition:width .5s}
.mobe{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:all .2s}
.mobe.ok{background:rgba(52,199,89,0.07)!important;border-color:rgba(52,199,89,0.2)!important}
.mobn{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;background:rgba(0,122,255,0.1);color:var(--bl);margin-top:2px;transition:all .2s}
.mobn.ok{background:rgba(52,199,89,0.15);color:#1a7a38}
.dayr{display:flex;align-items:center;gap:11px;padding:11px 13px;margin-bottom:7px;border-radius:var(--r2);cursor:pointer;transition:all .18s}
.dayr.td{border-color:var(--bl)!important;border-width:1.5px!important}
.daydot{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.tc{width:46px;height:46px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.12);background:rgba(255,255,255,0.9);color:var(--t);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;box-shadow:var(--shadow)}
.tc:active{transform:scale(.9)}
.tval{font-size:46px;font-weight:800;min-width:60px;text-align:center;letter-spacing:-2px;color:var(--t)}
.pst{display:flex;gap:5px;margin:6px 0 4px}
.psb{flex:1;height:4px;border-radius:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.cal-dh{font-size:10px;font-weight:700;color:var(--t3);text-align:center;padding:4px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-d{height:38px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .18s;position:relative}
.cal-d.today{background:rgba(0,122,255,0.09);border:0.5px solid rgba(0,122,255,0.25)}
.cal-dn{font-size:12px;font-weight:600;color:var(--t2)}
.cal-d.trained .cal-dn{color:#fff;font-weight:700}
.cal-d.trained{border-radius:9px}
.back-btn{display:flex;align-items:center;gap:7px;background:none;border:none;color:var(--bl);font-size:14px;font-weight:600;cursor:pointer;padding:2px 0 10px;font-family:-apple-system,sans-serif}
.lv-track{display:flex;flex-direction:column;gap:0;margin-top:6px}
.lv-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:10px}
.lv-item.current{background:rgba(0,122,255,0.07);border:0.5px solid rgba(0,122,255,0.18)}
.lv-item.prev{opacity:.45}
.lv-item.next{opacity:.55}
.lvdots{display:flex;gap:4px}
.lvdot{width:7px;height:7px;border-radius:50%}
.sch-row{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:7px;border-radius:var(--r2)}
.sp-btn{padding:7px 13px;border-radius:99px;border:0.5px solid var(--bd);background:rgba(255,255,255,0.8);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:-apple-system,sans-serif}
.sp-btn.on{background:rgba(52,199,89,0.1);border-color:rgba(52,199,89,0.3);color:#1a7a38}
.hnote{background:rgba(255,107,53,0.08);border:0.5px solid rgba(255,107,53,0.18);border-radius:12px;padding:9px 12px;margin-bottom:8px;font-size:12px;color:var(--or)}
.core-sep{margin:12px 0 8px;display:flex;align-items:center;gap:8px}
.core-sep-line{flex:1;height:0.5px;background:var(--bd)}
.core-sep-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.adj-box{background:rgba(0,0,0,0.03);border:0.5px solid var(--bd);border-radius:var(--r2);padding:12px 13px;margin-top:10px}
.adj-row{display:flex;gap:8px;margin-top:9px}
.adj-btn{flex:1;padding:10px 8px;border-radius:12px;border:0.5px solid var(--bd);background:rgba(255,255,255,0.85);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:-apple-system,sans-serif;text-align:center;line-height:1.4;box-shadow:var(--shadow)}
.adj-btn:active{transform:scale(.97)}
.adj-btn.done{background:rgba(52,199,89,0.1);border-color:rgba(52,199,89,0.3);color:#1a7a38}
.adj-btn.warn{background:rgba(255,159,10,0.1);border-color:rgba(255,159,10,0.3);color:#9a5f00}
.warn-row{background:rgba(255,159,10,0.08);border:0.5px solid rgba(255,159,10,0.2);border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:12px;color:#9a5f00;display:flex;align-items:center;gap:7px}
.ai-box{background:linear-gradient(135deg,rgba(0,122,255,0.06),rgba(175,82,222,0.06));border:0.5px solid rgba(0,122,255,0.15);border-radius:var(--r);padding:14px;margin-bottom:9px}
.ai-resp{background:rgba(255,255,255,0.8);border-radius:12px;padding:12px;margin-top:10px;font-size:12px;color:var(--t2);line-height:1.7;max-height:220px;overflow-y:auto}
.ai-resp::-webkit-scrollbar{display:none}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mwrow{display:flex;gap:5px;margin:9px 0 6px}
.mw{flex:1;height:7px;border-radius:4px;transition:background .4s}
@keyframes au{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.au{animation:au .25s ease both}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes slideOutRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideOutLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.slide-in-left{animation:slideInLeft .28s cubic-bezier(0.25,0.46,0.45,0.94) both}
.slide-out-right{animation:slideOutRight .28s cubic-bezier(0.25,0.46,0.45,0.94) both}
.slide-in-right{animation:slideInRight .28s cubic-bezier(0.25,0.46,0.45,0.94) both}
.slide-out-left{animation:slideOutLeft .28s cubic-bezier(0.25,0.46,0.45,0.94) both}
#swipe-indicator{position:fixed;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to right,rgba(0,122,255,0.4),transparent);z-index:999;opacity:0;transition:opacity .1s;pointer-events:none}
#swipe-indicator.visible{opacity:1}
#fab{position:fixed;bottom:calc(var(--sb)+72px);right:16px;width:50px;height:50px;border-radius:50%;background:var(--bl);color:#fff;border:none;font-size:26px;cursor:pointer;z-index:100;box-shadow:0 4px 16px rgba(0,122,255,0.4);display:flex;align-items:center;justify-content:center;transition:all .2s}
#fab:active{transform:scale(.92)}
#sport-menu{position:fixed;bottom:calc(var(--sb)+130px);right:16px;z-index:101;background:var(--g2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:0.5px solid var(--bd2);border-radius:18px;padding:8px;box-shadow:0 8px 32px rgba(0,0,0,0.15);display:none;flex-direction:column;gap:4px;min-width:180px}
#sport-menu.show{display:flex}
.sport-item{padding:10px 14px;border-radius:12px;border:none;background:transparent;color:var(--t);font-size:14px;font-weight:500;cursor:pointer;text-align:left;font-family:-apple-system,sans-serif;transition:background .15s}
.sport-item:active{background:rgba(0,0,0,0.06)}
.sport-item.active{background:rgba(0,122,255,0.08);color:var(--bl);font-weight:700}
@keyframes celebIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.5)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes celebOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}
#celebration{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;background:var(--g2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:0.5px solid var(--bd2);border-radius:24px;padding:32px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);display:none;}
#celebration.show{display:block;animation:celebIn .35s cubic-bezier(0.34,1.56,0.64,1) both;}
#celebration.hide{animation:celebOut .25s ease both;}
/* HIIT TIMER */
#timer-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;max-width:430px;margin:0 auto;}
#timer-overlay.show{display:flex;}
.tim-hd{padding:calc(var(--st) + 14px) 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--bd);flex-shrink:0}
.tim-close{background:none;border:none;font-size:24px;color:var(--t2);cursor:pointer;padding:4px;}
.tim-body{flex:1;overflow-y:auto;padding:12px 16px 20px;}
.tim-body::-webkit-scrollbar{display:none}
.tim-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:20px;}
.tim-screen.active{display:flex;}
.tim-phase{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.tim-exname{font-size:16px;font-weight:600;color:var(--t2);margin-bottom:16px;text-align:center;}
.tim-circle{width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto 20px;position:relative;}
.tim-circle svg{position:absolute;inset:0;transform:rotate(-90deg);}
.tim-secs{font-size:64px;font-weight:800;letter-spacing:-3px;position:relative;z-index:1;}
.tim-sub{font-size:12px;color:var(--t3);position:relative;z-index:1;margin-top:4px;}
.tim-info-row{display:flex;gap:16px;margin-bottom:24px;justify-content:center;}
.tim-info{text-align:center;}
.tim-info-val{font-size:18px;font-weight:800;}
.tim-info-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;}
.tim-controls{display:flex;gap:10px;justify-content:center;}
.tim-ctrl{width:60px;height:60px;border-radius:50%;border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:var(--shadow);}
.tim-ctrl:active{transform:scale(.92);}
.tim-ctrl.play{width:72px;height:72px;background:var(--bl);color:#fff;font-size:28px;}
.tim-ctrl.stop{background:rgba(255,59,48,0.1);color:var(--re);}
.tim-ctrl.back{background:rgba(0,0,0,0.05);color:var(--t2);}
.tim-prog{display:flex;gap:4px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.tim-prog-dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,0.1);transition:background .3s;}
.tim-prog-dot.done{background:var(--gr);}
.tim-prog-dot.active{background:var(--bl);}
.tim-field{margin-bottom:12px;}
.tim-field label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;}
.tim-field input{width:100%;padding:10px 12px;border-radius:12px;border:0.5px solid var(--bd);background:rgba(255,255,255,0.85);color:var(--t);font-size:15px;font-family:-apple-system,sans-serif;box-shadow:var(--shadow);}
.tim-field input[type=number]{font-weight:700;}
.ex-inputs{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.ex-inp{display:flex;align-items:center;gap:8px;}
.ex-inp-num{width:22px;height:22px;border-radius:7px;background:rgba(0,122,255,0.1);color:var(--bl);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-inp input{flex:1;padding:9px 12px;border-radius:10px;border:0.5px solid var(--bd);background:rgba(255,255,255,0.85);color:var(--t);font-size:13px;font-family:-apple-system,sans-serif;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.pulsing{animation:pulse .5s ease infinite;}
/* CALENDAR DAY MODAL */
#cal-modal{position:fixed;inset:0;z-index:300;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);}
#cal-modal.show{display:flex;}
#cal-modal-inner{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:0 0 calc(var(--sb)+16px);max-height:85vh;overflow-y:auto;}
#cal-modal-inner::-webkit-scrollbar{display:none}
.cal-modal-hd{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;}
.cal-modal-close{background:rgba(0,0,0,0.06);border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);}
.cal-toggle{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-radius:14px;margin:0 16px 10px;cursor:pointer;transition:all .2s;}
.cal-toggle:active{opacity:.75}
.cal-toggle-info{display:flex;align-items:center;gap:10px;}
.cal-toggle-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-toggle-check{width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .2s;}
.cal-toggle-check.on{background:var(--gr);border-color:var(--gr);color:#fff;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#cal-modal-inner{animation:slideUp .25s cubic-bezier(0.34,1.56,0.64,1) both;}
select{background:rgba(255,255,255,0.85);border:0.5px solid var(--bd);border-radius:9px;color:var(--t);font-size:11px;padding:5px 8px;cursor:pointer;font-family:-apple-system,sans-serif;box-shadow:var(--shadow)}
</style>
<script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/train-app/sw.js').then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            showUpdateBanner(newSW);
          }
        });
      });
    });
  });
}
function showUpdateBanner(newSW){
  const banner=document.getElementById('update-banner');
  if(banner){banner.style.display='flex';}
  window._pendingSW=newSW;
}
function applyUpdate(){
  if(window._pendingSW){window._pendingSW.postMessage('skipWaiting');}
  window.location.reload();
}
</script>
</head>
<body>
<div id="app" style="min-height:100vh;background:#F2F3F8;font-family:-apple-system,sans-serif">
  <!-- Update banner -->

<!-- HIIT TIMER OVERLAY -->
<div id="timer-overlay">
  <div class="tim-hd">
    <div style="font-size:17px;font-weight:800">Temporizador HIIT</div>
    <button class="tim-close" onclick="closeTimer()"><span style="">✕</span></button>
  </div>
  <div id="tim-setup" class="tim-body">
    <div class="slbl">Tiempo</div>
    <div class="card gl" style="padding:12px 14px;margin-bottom:9px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="tim-field"><label>Cuenta atras inicial (s)</label><input type="number" id="t-pre" value="10" min="0" max="30"></div>
        <div class="tim-field"><label>Trabajo (s)</label><input type="number" id="t-work" value="40" min="5" max="300"></div>
        <div class="tim-field"><label>Descanso (s)</label><input type="number" id="t-rest" value="20" min="5" max="300"></div>
        <div class="tim-field"><label>Descanso entre ciclos (s)</label><input type="number" id="t-cyclerest" value="60" min="0" max="300"></div>
      </div>
    </div>
    <div class="slbl">Estructura</div>
    <div class="card gl" style="padding:12px 14px;margin-bottom:9px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="tim-field"><label>Intervalos por ciclo</label><input type="number" id="t-intervals" value="4" min="1" max="10" onchange="updateExInputs()"></div>
        <div class="tim-field"><label>Numero de ciclos</label><input type="number" id="t-cycles" value="5" min="1" max="20"></div>
      </div>
    </div>
    <div class="slbl">Ejercicios <span style="font-weight:400;font-size:11px;color:var(--t3)">(opcional)</span></div>
    <div class="card gl" style="padding:12px 14px;margin-bottom:9px">
      <div class="ex-inputs" id="ex-inputs"></div>
    </div>
    <button class="btn btnb" onclick="startTimer()" style="margin-top:4px"><span style="vertical-align:-2px;margin-right:6px">▶</span>Iniciar</button>
  </div>
  <div id="tim-running" style="display:none;flex-direction:column;flex:1;padding:20px 16px;align-items:center;justify-content:space-between">
    <div style="width:100%">
      <div id="tim-phase" class="tim-phase" style="text-align:center;color:var(--bl)">PREPARADO</div>
      <div id="tim-exname" class="tim-exname"></div>
      <div id="tim-prog" class="tim-prog"></div>
    </div>
    <div style="text-align:center">
      <div class="tim-circle" id="tim-circle">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="10"/>
          <circle id="tim-arc" cx="100" cy="100" r="88" fill="none" stroke="#007AFF" stroke-width="10" stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="0" style="transition:stroke-dashoffset .9s linear,stroke .3s"/>
        </svg>
        <div id="tim-secs" class="tim-secs">--</div>
        <div id="tim-total" style="font-size:12px;color:var(--t3);position:relative;z-index:1;margin-top:2px">de -- s</div>
        <div id="tim-sub" class="tim-sub"></div>
      </div>
    </div>
    <div style="width:100%">
      <div class="tim-info-row" id="tim-info-row"></div>
      <div class="tim-controls">
        <button class="tim-ctrl back" onclick="timerBack()"><span></span></button>
        <button class="tim-ctrl play" id="tim-playbtn" onclick="togglePause()"><span style="">⏸</span></button>
        <button class="tim-ctrl stop" onclick="stopTimer()"><span style="">⏹</span></button>
      </div>
    </div>
  </div>
</div>

</div>

    {id:"rb1",n:"Respiracion diafragmatica",r:"2-3 minutos",desc:"Tumbado boca arriba con rodillas flexionadas. Una mano en el abdomen y otra en el pecho. Inhala por la nariz expandiendo el abdomen — la mano del abdomen sube, la del pecho apenas se mueve. Exhala lentamente por la boca vaciando el abdomen. Reduce la tension muscular refleja que acompaña al dolor lumbar y activa el sistema nervioso parasimpatico.",tip:"Si solo sube el pecho estas usando la respiracion toracica. Practica hasta que el abdomen sea el primero en expandirse."},
    {id:"rb2",n:"Cat-Cow suave",r:"2 x 8-10 reps",desc:"En cuadrupedia, alterna muy suavemente entre arquear la espalda hacia el suelo (extensión, cabeza arriba) y redondearla hacia el techo (flexion, cabeza abajo). Durante el dolor lumbar el movimiento debe ser minimo y sin forzar — solo hasta donde no haya molestia.",tip:"Si hay dolor en alguna de las dos posiciones, reduce el rango hasta que sea completamente indoloro. La fluidez es mas importante que el rango."},
    {id:"rb3",n:"Cobra suave McKenzie",r:"2 x 8 reps",desc:"Tumbado boca abajo, apoya los antebrazos en el suelo y eleva ligeramente el pecho. Mantén 2-3 segundos y vuelve al suelo. Este movimiento de extension lumbar es el protocolo McKenzie, uno de los mas efectivos para el dolor discal. Ojo: si el dolor empeora o se irradia hacia la pierna, para inmediatamente.",tip:"El movimiento debe ser muy suave. Los gluteos permanecen relajados durante todo el ejercicio. Si sientes alivio al extender, es una buena señal."},
    {id:"rb4",n:"Rodillas al pecho",r:"2 x 30s",desc:"Tumbado boca arriba, abraza ambas rodillas suavemente llevandolas hacia el pecho. Mantén la posicion respirando profundo. Relaja activamente la musculatura lumbar y el piriforme.",tip:"No tires con fuerza. Es un abrazo suave, no un estiramiento agresivo. Si un lado duele mas, lleva primero ese lado."},
    {id:"rb5",n:"Pelvic tilts",r:"2 x 10 reps",desc:"Tumbado boca arriba con rodillas flexionadas. Presiona la zona lumbar contra el suelo (retroversion pelvica) y luego vuelve a la posicion neutra. No arquees en exceso. Este micro movimiento activa el transverso abdominal y el multifido profundo — los estabilizadores principales de la columna.",tip:"El movimiento es muy pequeño, apenas unos centimetros. Concéntrate en sentir como la lumbar presiona el suelo."},
    {id:"rb6",n:"Child pose con respiracion",r:"2 x 45s",desc:"De rodillas, sienta los gluteos sobre los talones y estira los brazos al frente. Deja que la gravedad estire la espalda. Mientras mantienes la posicion, respira profundo intentando que el aire llegue a la zona lumbar — sentiras como se abre con cada inhalacion.",tip:"Si las rodillas duelen, pon una almohada debajo. Si los gluteos no llegan a los talones, pon una almohada entre los muslos y el pecho."},
    {id:"rb7",n:"Rotacion de columna tumbado",r:"2 x 6/lado",desc:"Tumbado boca arriba con rodillas flexionadas, deja caer ambas rodillas juntas hacia un lado mientras la mirada va al lado contrario. Mantén 20-30 segundos. Moviliza suavemente la columna lumbar y relaja los musculos paravertebrales que se contraen de forma protectora durante el dolor.",tip:"El movimiento debe ser completamente pasivo — la gravedad hace el trabajo. No fuerces con los musculos. Los hombros permanecen pegados al suelo."},
    {id:"rb8",n:"Estiramiento piriforme tumbado",r:"45s/lado",desc:"Tumbado boca arriba, cruza el tobillo derecho sobre la rodilla izquierda formando una figura 4. Tira suavemente de la pierna izquierda hacia el pecho. El piriforme es un musculo profundo de la cadera que cuando se tensa puede comprimir el nervio ciatico y generar o empeorar el dolor lumbar.",tip:"Si sientes el estiramiento en el gluteo del lado cruzado, estas en la posicion correcta. Si hay dolor en la rodilla, reduce la presion."},
    {id:"rb9",n:"Flexion de cadera asistida",r:"2 x 8/lado",desc:"Tumbado boca arriba, lleva una rodilla al pecho con ambas manos. Mantén 5 segundos y baja. Alterna piernas. Moviliza la articulacion de la cadera y estira el psoas — el musculo flexor de cadera que cuando esta acortado por estar sentado mucho tiempo tira de la columna lumbar hacia adelante generando tension.",tip:"No levantes la cabeza ni el otro pie del suelo. Movimiento lento y controlado."},

  back_prev:[
    {id:"rp1",n:"Dead bug",r:"2-3 x 8/lado",desc:"Tumbado boca arriba con rodillas a 90 grados y brazos hacia el techo. Extiende el brazo derecho y la pierna izquierda simultaneamente hasta casi tocar el suelo, vuelve y alterna. La lumbar NO se separa del suelo en ningun momento — ese es el unico objetivo. Activa el transverso abdominal sin comprimir la columna.",tip:"Si la lumbar se levanta, reduce el rango. Empieza solo moviendo las piernas o solo los brazos hasta dominar el patron."},
    {id:"rp2",n:"Bird dog",r:"2-3 x 8/lado",desc:"En cuadrupedia con espalda completamente plana, extiende el brazo derecho y la pierna izquierda hasta que queden horizontales. Mantén 2-3 segundos apretando el gluteo. La cadera NO rota al subir la pierna. Fortalece el multifido, el gluteo y los estabilizadores de la columna.",tip:"Imagina que tienes un vaso de agua sobre la espalda y no puedes derramarlo. Si la cadera rota, baja la pierna hasta que no rote."},
    {id:"rp3",n:"Rotacion 90-90 de cadera",r:"2 x 8 reps",desc:"Sentado en el suelo con ambas piernas formando angulos de 90 grados (una adelante, otra al lado). Cambia de lado lentamente controlando el movimiento con las manos en el suelo. Mejora la rotacion interna y externa de cadera — la falta de esta movilidad obliga a la lumbar a compensar durante actividades diarias y ejercicio.",tip:"No te apoyes demasiado en las manos. El objetivo es que la pelvis se mueva con control."},
    {id:"rp4",n:"Thread the needle",r:"2 x 6/lado",desc:"En cuadrupedia, introduce un brazo por debajo del cuerpo hasta que el hombro y la mejilla toquen el suelo. El otro brazo puede extenderse al frente o apoyarse. Mejora la rotacion toracica y la movilidad escapular. Una toracica movil reduce la carga que la lumbar recibe en los movimientos de rotacion.",tip:"La cadera queda completamente fija. Solo rota la zona toracica. Respira profundo en la posicion final."},
    {id:"rp5",n:"Hip airplane asistido",r:"2 x 5/lado",desc:"De pie cerca de una pared para apoyo. Mantente sobre una pierna y rota la pelvis de forma controlada hacia adelante y atras (anteversion y retroversion) sin mover el torso. Mejora el control neuromuscular de la cadera y reduce las compensaciones lumbares durante la marcha y el entrenamiento.",tip:"La rodilla de apoyo esta ligeramente flexionada. El movimiento sale de la cadera, no de la columna."},
    {id:"rp6",n:"Extension toracica sobre rodillo",r:"1-2 minutos",desc:"Tumbado boca arriba con el rodillo o una toalla enrollada bajo la zona toracica (entre omoplatos y parte media de la espalda). Brazos cruzados sobre el pecho o manos detras de la cabeza. Deja que la gravedad extienda suavemente la columna toracica. Contrarresta la cifosis y la postura encorvada.",tip:"NO pongas el rodillo en la zona lumbar. Solo toracica. Si sientes molestia aguda, el rodillo esta muy duro — usa una toalla doblada."},
    {id:"rp7",n:"Puente de gluteo",r:"3 x 10-12 reps",desc:"Tumbado boca arriba con rodillas flexionadas, eleva la cadera del suelo apretando el gluteo hasta que el cuerpo forme una linea recta de hombros a rodillas. Mantén 2 segundos arriba. El gluteo debil es una de las causas mas frecuentes de dolor lumbar cronico — cuando el gluteo no trabaja bien, la espalda baja compensa.",tip:"Aprieta el gluteo, no la lumbar. Si sientes la lumbar trabajando en exceso en vez del gluteo, reduce el rango de movimiento."},
    {id:"rp8",n:"Plancha lateral modificada",r:"2 x 20-30s/lado",desc:"Apoyo sobre el antebrazo y las rodillas (version modificada). El cuerpo forma una linea recta de cabeza a rodillas. Fortalece el cuadrado lumbar y los oblicuos — los estabilizadores laterales que evitan que la columna se doble de lado durante la marcha y el ejercicio.",tip:"Si la version de rodillas es comoda, progresa a pies. Asegurate de que la cadera no cae hacia el suelo."},
    {id:"rp9",n:"90-90 Hip switch",r:"2 x 8 reps",desc:"Sentado con ambas piernas en 90 grados, cambia de lado llevando las rodillas al suelo de forma controlada usando las manos como apoyo ligero. Trabaja la rotacion interna y externa de cadera activamente. La falta de movilidad de cadera es una de las principales causas de sobrecarga lumbar en personas activas.",tip:"El movimiento debe ser activo, no pasivo. Intenta reducir el apoyo de las manos con el tiempo. La pelvis se mueve con las piernas."},
  ],
};

function getHiitExercises(){
  var custom=localStorage.getItem("hiit_custom");
  if(custom){try{var arr=JSON.parse(custom);if(arr.length>=2)return arr;}catch(e){}}
  var seed=ST.week*17+3;
  var pool=HIIT_POOL.slice();
  for(var i=pool.length-1;i>0;i--){var j=(seed*(i+3)+i*7)%(i+1);var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;}
  return pool.slice(0,4);
}

function getRecoveryExercises(focus){
  var week=ST.week;
  var all=[];
  if(focus==="back_pain"){
    return RECOVERY_POOL.back_pain;
  } else if(focus==="back_prev"){
    return RECOVERY_POOL.back_prev;
  } else if(!focus||focus==="all"){
    all=[].concat(RECOVERY_POOL.upper.slice(0,2),RECOVERY_POOL.lower.slice(0,2),RECOVERY_POOL.full.slice(0,2));
  } else if(focus==="upper"){
    all=RECOVERY_POOL.upper.concat(RECOVERY_POOL.full.slice(0,1));
  } else if(focus==="lower"){
    all=RECOVERY_POOL.lower.concat(RECOVERY_POOL.full.slice(0,1));
  } else {
    all=RECOVERY_POOL.full.concat(RECOVERY_POOL.upper.slice(0,1),RECOVERY_POOL.lower.slice(0,1));
  }
  var offset=(week-1)*2;
  return all.slice(offset%all.length).concat(all.slice(0,offset%all.length)).slice(0,6);
}

    const ws=["wk","lv2","xlv2","sched2","dn_"+tstr,"md_"+tstr,"hist2","aiResp2"];
    const vs=await Promise.all(ws.map(k=>ld(k)));
    if(vs[0])ST.week=Math.min(4,Math.max(1,parseInt(vs[0])||1));
    if(vs[1])ST.lv=parseInt(vs[1])||0;
    if(vs[2])ST.xlv=JSON.parse(vs[2]);
    if(vs[3]){
      const saved=JSON.parse(vs[3]);
      // Migrate: if old schedule has 'co' day, reset to new default (no dedicated core day)
      if(saved.includes('co')){
        ST.sched=[...DEFAULT_SCHED];
        await sv("sched2",JSON.stringify(ST.sched));
      } else {
        ST.sched=saved;
      }
    }
    if(vs[4]){
      const loaded=new Set(JSON.parse(vs[4]));
      // Build complete set of ALL valid exercise IDs across all sessions
      const allValidIds=new Set(Object.values(SESS).flat().filter(e=>e.id).map(e=>e.id));
      // Only keep IDs that exist in current app version
      ST.done=new Set([...loaded].filter(id=>allValidIds.has(id)));
      // Save cleaned version back
      if(ST.done.size!==loaded.size){
        localStorage.setItem("dn_"+tstr,JSON.stringify([...ST.done]));
      }
    }
    if(vs[5])ST.mdone=new Set(JSON.parse(vs[5]));
    if(vs[6])ST.history=JSON.parse(vs[6]);
    if(vs[7])ST.aiResp=vs[7];
    const fr=await ld("free_"+tstr);if(fr)ST.free[tstr]=fr;
    const pp=await ld("post_"+tstr);if(pp)ST.postponed=true;
    for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-sidx+i);const ds=d.toDateString();const sp=await ld("sp_"+ds);if(sp)ST.sport[ds]=sp;}
  }catch(e){}
  render();
}

function calcLv(){const{push,row,dip,swing,pistol}=ST.tv;let sc=0;sc+=push>=25?3:push>=15?2:push>=8?1:0;sc+=row>=20?3:row>=12?2:row>=6?1:0;sc+=dip>=20?3:dip>=12?2:dip>=6?1:0;sc+=swing>=25?3:swing>=18?2:swing>=10?1:0;sc+=pistol==="yes"?3:pistol==="almost"?2:1;return sc>=12?4:sc>=8?3:sc>=4?2:1;}
function testToXlv(lv){const{push,row,dip,swing,pistol}=ST.tv;const pL=push>=25?3:push>=15?2:push>=8?1:0;const rL=row>=20?3:row>=12?2:row>=6?1:0;const dL=dip>=20?3:dip>=12?2:dip>=6?1:0;const kL=swing>=25?3:swing>=18?2:swing>=10?1:0;const lgL=pistol==="yes"?3:pistol==="almost"?2:1;const x={};Object.keys(SESS).forEach(sk=>{SESS[sk].forEach(ex=>{let v=lv-1;const p=ex.pat;if(["Empuje horizontal","Empuje vertical","Triceps"].includes(p))v=pL;else if(["Tiron horizontal","Biceps","Hombro posterior","Hombro lateral"].includes(p))v=rL;else if(p==="Empuje accesorio")v=dL;else if(["Dom. rodilla","Dom. cadera","Gluteo","Unilateral","Cuadriceps"].includes(p))v=lgL;else if(["Balistico","Full body KB"].includes(p))v=kL;x[ex.id]=Math.min(3,Math.max(0,v));});});return x;}

  const tests=[{q:"Flexiones estrictas al maximo",sub:"Tecnica perfecta · Cuerpo rigido · Al fallo tecnico",k:"push"},{q:"Remo australiano en paralelas",sub:"Cuerpo lo mas horizontal posible · Al fallo tecnico",k:"row"},{q:"Fondos en paralelas",sub:"Rango completo 90 grados de codo · Al fallo",k:"dip"},{q:"KB Swings en 30 segundos",sub:"KB 16kg · Sin parar · Maximas reps posibles",k:"swing"}];

    <div class="card gls" style="text-align:center;padding:20px 14px"><div style="font-size:16px;font-weight:800;margin-bottom:3px">${t.q}</div><div style="font-size:12px;color:var(--t3);margin-bottom:22px">${t.sub}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:8px"><button class="tc" onclick="at_('${t.k}',-1)">−</button><div class="tval">${val}</div><button class="tc" onclick="at_('${t.k}',1)">+</button></div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:20px">${val} repeticiones</div>
    <button class="btn btnb" onclick="nt(${ts+1})" style="margin-bottom:${ts>1?"8":"0"}px">${ts===4?"Ver resultado":"Siguiente →"}</button>
    ${ts>1?`<button class="btn btng" onclick="nt(${ts-1})">← Atras</button>`:""}
    </div>`;}
  if(ts===5)return`<div class="card gls" style="text-align:center;padding:20px 14px">
    <div style="font-size:16px;font-weight:800;margin-bottom:4px">¿Puedes hacer un pistol squat?</div>

    ${[["yes","Si, completo"],["almost","Casi, con apoyo leve"],["no","No por ahora"]].map(([v,l])=>`<button class="btn btng" onclick="sp_('${v}')" style="margin-bottom:8px;${ST.tv.pistol===v?"border-color:var(--bl);color:var(--bl);background:rgba(0,122,255,0.06)":""}">${l}</button>`).join("")}
    ${ST.tv.pistol?`<button class="btn btnb" onclick="finish_()" style="margin-top:6px">Calcular mi nivel →</button>`:""}
    </div>`;
  if(ts===6){const lv=calcLv();const N=["","Principiante","Intermedio","Avanzado","Elite"][lv];const C=["","#34C759","#007AFF","#AF52DE","#FF9F0A"][lv];const D=["","Base en construccion. El programa crea los cimientos.","Buena base. El programa escala rapidamente.","Gran nivel. Variantes exigentes desde el dia 1.","Nivel muy alto. Maxima exigencia desde el inicio."][lv];
    return`<div class="card gls" style="text-align:center;padding:26px 14px;margin-top:16px">
    <div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;margin-bottom:7px">TU NIVEL</div>
    <div style="font-size:30px;font-weight:800;color:${C};margin-bottom:5px">${N}</div>
    <div style="font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:16px">${D}</div>
    <div style="background:rgba(0,0,0,0.04);border-radius:13px;padding:12px;margin-bottom:18px;text-align:left">
      <div style="font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px">Resultados</div>
      <div style="font-size:13px;color:var(--t2);line-height:2.2">Flexiones: <strong style="color:var(--t)">${ST.tv.push}</strong> &nbsp;·&nbsp; Remo: <strong style="color:var(--t)">${ST.tv.row}</strong> &nbsp;·&nbsp; Fondos: <strong style="color:var(--t)">${ST.tv.dip}</strong><br>Swing 30s: <strong style="color:var(--t)">${ST.tv.swing}</strong> &nbsp;·&nbsp; Pistol: <strong style="color:var(--t)">${ST.tv.pistol==="yes"?"Completo":ST.tv.pistol==="almost"?"Con apoyo":"En progresion"}</strong></div>
    </div>
    <button class="btn btnb" onclick="activateApp(${lv})">Empezar el programa →</button>
    </div>`;}
  return "";
}
function at_(k,d){ST.tv[k]=Math.max(0,ST.tv[k]+d);sH(rTest());}

function checkSchedConflicts(sched){
  const warns=[];
  for(let i=0;i<6;i++){const a=sched[i];const b=sched[i+1];if(a&&b&&SM[a]&&SM[b]&&SM[a].group===SM[b].group&&SM[a].group!=="hiit"&&SM[a].group!=="core")warns.push(`${DNAMES[i]} y ${DNAMES[i+1]} tienen el mismo grupo muscular (${SM[a].group}) en dias consecutivos`);}
  return warns;
}

    h+='<div class="sch-row gl" style="margin-bottom:7px"><div style="width:30px;height:30px;border-radius:8px;background:'+(sm?sm.bg:'rgba(0,0,0,0.04)')+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:'+(sm?sm.c:'var(--t3)')+'">'+DNAMES[i][0]+'</div><div style="flex:1"><div style="font-size:12px;font-weight:600">'+DNAMES[i]+'</div><div style="font-size:11px;color:var(--t3)">'+(sm?sm.l:'Descanso')+'</div></div><div style="display:flex;gap:5px">'+up+dn+'</div></div>';
  }
  h+='<button onclick="resetSched()" class="btn btng" style="margin-top:4px">Restablecer orden original</button>';
  h+='<div class="slbl" style="margin-top:6px">Herramientas</div><div class="card gl" style="padding:12px 14px;margin-bottom:9px">';
  h+='<button onclick="exportProgress()" class="btn btnb" style="margin-bottom:8px">Exportar progreso</button>';
  h+='<button onclick="importProgress()" class="btn btng" style="margin-bottom:8px">Importar progreso</button>';
  h+='<button onclick="resetApp()" class="btn" style="color:var(--re);border-color:rgba(255,59,48,0.3)">Reiniciar app</button></div>';
  const remOn=localStorage.getItem('rem_on')==='1';
  h+='<div class="slbl" style="margin-top:6px">Recordatorio</div><div class="card gl" style="padding:12px 14px;margin-bottom:9px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><span style="font-size:13px">Activar</span>';
  h+='<input type="checkbox" '+(remOn?'checked':'')+' onchange="toggleReminder(this.checked)" style="width:40px;height:24px;cursor:pointer"></div>';
  const remTime=localStorage.getItem('rem_time')||'08:00';
  h+='<input type="time" value="'+remTime+'" onchange="setReminderTime(this.value)" style="width:100%;padding:8px;border-radius:10px;border:0.5px solid var(--bd);background:var(--bg2);font-size:14px;color:var(--t)"></div>';
  return h;
}
async function swapDays(a,b){const t=ST.sched[a];ST.sched[a]=ST.sched[b];ST.sched[b]=t;await sv("sched2",JSON.stringify(ST.sched));sH(rTab(),false);}
async function resetSched(){ST.sched=[...DEFAULT_SCHED];await sv("sched2",JSON.stringify(ST.sched));sH(rTab(),false);}
async function markCompleted(sk){
  const key="completed_"+tstr;
  if(localStorage.getItem(key)===sk){localStorage.removeItem(key);localStorage.removeItem("sh_"+tstr);ST.done=new Set();await sv("dn_"+tstr,"[]");}
  else{const ids=sk==="hi"?getHiitExercises().map(e=>e.id):getSessionExs(sk).map(e=>e.id);ST.done=new Set(ids);await sv("dn_"+tstr,JSON.stringify(ids));localStorage.setItem(key,sk);localStorage.setItem("sh_"+tstr,sk);showCelebration(sk);}
  sH(rTab(),true);setTimeout(loadCalDots,50);setTimeout(loadCalDots,400);
}
async function markFree(){const k="free_"+tstr;if(localStorage.getItem(k))localStorage.removeItem(k);else localStorage.setItem(k,"1");setTimeout(loadCalDots,50);sH(rTab(),true);}
async function postponeDay(){for(let d=sidx+1;d<7;d++){if(!ST.sched[d]){ST.sched[sidx]=null;ST.sched[d]=DEFAULT_SCHED[sidx];await sv("sched2",JSON.stringify(ST.sched));sH(rTab(),false);return;}}alert("No hay dia de descanso disponible.");}
async function completeAllMob(){
  if(MOB.every(m=>ST.mdone.has(m.id)))MOB.forEach(m=>ST.mdone.delete(m.id));
  else{MOB.forEach(m=>ST.mdone.add(m.id));showCelebration("mob");}
  await sv("md_"+tstr,JSON.stringify([...ST.mdone]));sH(rMob(),true);
}
function markRcCompleted(){
  const key="rc_completed_"+tstr;
  if(localStorage.getItem(key)==="1"){localStorage.removeItem(key);ST.done=new Set([...ST.done].filter(id=>!id.startsWith("rc_")));}
  else{localStorage.setItem(key,"1");getRecoveryExercises(localStorage.getItem("rc_focus")||"all").forEach(ex=>ST.done.add("rc_"+ex.id));sv("dn_"+tstr,JSON.stringify([...ST.done]));showCelebration("rc");}
  sH(rTab(),true);
}
function showCelebration(type){
  const el=document.getElementById("celebration");if(!el)return;
  const msgs={mob:"Movilidad completada",tf:"Torso Fuerza completado",pf:"Pierna Fuerza completada",th:"Torso Hipertrofia completado",ph:"Pierna Hipertrofia completada",hi:"HIIT completado",rc:"Recuperacion completada",relax:"Relax lumbar completado"};
  el.innerHTML='<div class="cel-inner"><div class="cel-ico">'+({mob:"&#9728;",tf:"&#128170;",pf:"&#129461;",th:"&#128293;",ph:"&#128165;",hi:"&#9889;",rc:"&#129496;",relax:"&#128992;"}[type]||"&#10003;")+'</div><div class="cel-t">'+(msgs[type]||"Completado")+'</div></div>';
  el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3000);
}
function exportProgress(){
  const d={ST:{...ST,done:[...ST.done],mdone:[...ST.mdone]},ls:{}};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d.ls[k]=localStorage.getItem(k);}
  const el=document.createElement("textarea");el.value=JSON.stringify(d);document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);alert("Progreso copiado al portapapeles.");
}
function importProgress(){
  const str=prompt("Pega tu codigo:");if(!str)return;
  try{const d=JSON.parse(str);if(d.ls)Object.keys(d.ls).forEach(k=>localStorage.setItem(k,d.ls[k]));alert("Restaurado.");location.reload();}catch(e){alert("Codigo invalido.");}
}
function resetApp(){if(confirm("Borrar todo el progreso?")){localStorage.clear();location.reload();}}
function toggleReminder(on){localStorage.setItem("rem_on",on?"1":"0");}
function setReminderTime(t){localStorage.setItem("rem_time",t);}
function initReminder(){
  if(localStorage.getItem("rem_on")!=="1")return;
  const[h,m]=(localStorage.getItem("rem_time")||"08:00").split(":").map(Number);
  const now=new Date(),next=new Date();next.setHours(h,m,0,0);if(next<=now)next.setDate(next.getDate()+1);
  setTimeout(()=>{if(Notification.permission==="granted")new Notification("Train.","Tu sesion te espera.");},next-now);
}
function openCalDay(ds){
  const modal=document.getElementById("cal-modal");if(!modal)return;modal._ds=ds;
  const d=new Date(ds);document.getElementById("cal-modal-title").textContent=DNAMES[d.getDay()===0?6:d.getDay()-1];
  const comp=localStorage.getItem("completed_"+ds),mob=localStorage.getItem("mob_completed_"+ds),sp=localStorage.getItem("sp_"+ds);
  let sub=(comp&&SM[comp])?SM[comp].l:"Descanso";if(sp)sub+=" - "+sp;document.getElementById("cal-modal-sub").textContent=sub;
  const body=document.getElementById("cal-modal-body");body.innerHTML="";
  function mkRow(bg,lbl,col,fw,checked,fn){
    const row=document.createElement("div");row.className="cal-toggle";row.style.background=bg;row.addEventListener("click",fn);
    const info=document.createElement("div");info.className="cal-toggle-info";
    const dot=document.createElement("div");dot.className="cal-toggle-dot";dot.style.background=col;
    const l=document.createElement("div");l.style.cssText="font-size:13px;font-weight:"+fw+";color:"+col;l.textContent=lbl;
    info.appendChild(dot);info.appendChild(l);
    const chk=document.createElement("div");chk.className="cal-toggle-check"+(checked?" on":"");chk.innerHTML="✓";
    row.appendChild(info);row.appendChild(chk);return row;
  }
  const s1=document.createElement("div");s1.style.cssText="padding:0 16px 8px";
  const l1=document.createElement("div");l1.style.cssText="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:8px";l1.textContent="Entrenamiento";s1.appendChild(l1);
  Object.keys(SM).filter(s=>s!=="co"&&s!=="rc").forEach(s=>{const sml=SM[s];const isC=comp===s;s1.appendChild(mkRow(isC?sml.bg:"rgba(0,0,0,0.03)",sml.l,isC?sml.c:"var(--t2)",isC?"700":"500",isC,()=>toggleCalSession(modal._ds,s)));});
  body.appendChild(s1);
  const s2=document.createElement("div");s2.style.cssText="padding:0 16px 16px";
  const l2=document.createElement("div");l2.style.cssText="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:8px";l2.textContent="Movilidad";s2.appendChild(l2);
  s2.appendChild(mkRow(mob?"rgba(52,199,89,0.08)":"rgba(0,0,0,0.03)","Movilidad matutina",mob?"#1a7a38":"var(--t2)",mob?"700":"500",!!mob,()=>toggleCalMob(modal._ds)));
  body.appendChild(s2);modal.classList.add("show");
}
function closeCalModal(){const m=document.getElementById("cal-modal");if(m)m.classList.remove("show");setTimeout(loadCalDots,200);}
function toggleCalSession(ds,sk){const cur=localStorage.getItem("completed_"+ds);if(cur===sk){localStorage.removeItem("completed_"+ds);localStorage.removeItem("sh_"+ds);}else{localStorage.setItem("completed_"+ds,sk);localStorage.setItem("sh_"+ds,sk);}openCalDay(ds);setTimeout(loadCalDots,100);}
function toggleCalMob(ds){if(localStorage.getItem("mob_completed_"+ds))localStorage.removeItem("mob_completed_"+ds);else localStorage.setItem("mob_completed_"+ds,"1");openCalDay(ds);}
function toggleProgSection(sk){if(!ST.progOpen)ST.progOpen={};ST.progOpen[sk]=!ST.progOpen[sk];sH(rTab(),true);}
function openDayEditor(dayIdx){
  const modal=document.getElementById("day-editor");if(!modal)return;
  document.getElementById("day-editor-title").textContent="Cambiar: "+DNAMES[dayIdx];
  const body=document.getElementById("day-editor-body");body.innerHTML="";
  Object.keys(SM).filter(s=>s!=="co"&&s!=="rc").forEach(s=>{
    const sm=SM[s],isC=ST.sched[dayIdx]===s;
    const row=document.createElement("div");
    row.style.cssText="display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;margin-bottom:7px;cursor:pointer;background:"+(isC?sm.bg:"rgba(0,0,0,0.02)")+";border:0.5px solid "+(isC?sm.c+"44":"var(--bd)");
    row.addEventListener("click",()=>setDaySession(dayIdx,s));
    const icon=document.createElement("div");icon.style.cssText="width:32px;height:32px;border-radius:9px;background:"+sm.bg+";display:flex;align-items:center;justify-content:center;flex-shrink:0";
    icon.innerHTML="<span></span>";
    const lbl=document.createElement("div");lbl.innerHTML="<div style='font-size:13px;font-weight:"+(isC?"700":"500")+";color:"+(isC?sm.c:"var(--t)")+"'>"+sm.l+"</div>";
    row.appendChild(icon);row.appendChild(lbl);
    if(isC){const ck=document.createElement("i");ck.className="ti ti-check";ck.style.cssText="color:var(--gr);font-size:16px;margin-left:auto";row.appendChild(ck);}
    body.appendChild(row);
  });modal.style.display="flex";
}
async function setDaySession(i,sk){ST.sched[i]=sk;await sv("sched2",JSON.stringify(ST.sched));document.getElementById("day-editor").style.display="none";sH(rTab(),false);}
function startRecovery(){localStorage.setItem("rc_active_"+tstr,"1");ST.done=new Set();sH(rTab(),false);}
function setRcFocus(focus){localStorage.setItem("rc_focus",focus);sH(rTab(),false);}
async function tapRcEx(id){if(ST.done.has(id))ST.done.delete(id);else ST.done.add(id);await sv("dn_"+tstr,JSON.stringify([...ST.done]));sH(rTab(),true);}
function showHiitCustomizerFull(){
  const modal=document.getElementById("hiit-modal"),list=document.getElementById("hiit-pool-list");if(!modal||!list)return;
  let custom=null;try{custom=JSON.parse(localStorage.getItem("hiit_custom")||"null");}catch(e){}
  const selIds=custom?custom.map(e=>e.id):[];list.innerHTML="";
  HIIT_POOL.forEach(ex=>{
    const isSel=selIds.length===0||selIds.includes(ex.id);
    const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--bd);cursor:pointer";
    row.setAttribute("data-id",ex.id);row.setAttribute("data-name",ex.n);row.setAttribute("data-sel",isSel?"1":"0");
    const chk=document.createElement("div");chk.className="hchk";chk.style.cssText="width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid "+(isSel?"transparent":"rgba(0,0,0,0.15)")+";background:"+(isSel?"var(--bl)":"transparent");
    if(isSel)chk.innerHTML="<span style='color:#fff'>&#10003;</span>";
    const info=document.createElement("div");info.innerHTML="<div style='font-size:13px;font-weight:600'>"+ex.n+"</div><div style='font-size:11px;color:var(--t3)'>"+ex.pat+"</div>";
    row.appendChild(chk);row.appendChild(info);
    row.addEventListener("click",function(){const s=this.getAttribute("data-sel")==="1";this.setAttribute("data-sel",s?"0":"1");const c=this.querySelector(".hchk");c.style.background=s?"transparent":"var(--bl)";c.style.borderColor=s?"rgba(0,0,0,0.15)":"transparent";c.innerHTML=s?"":"<span style='color:#fff'>&#10003;</span>";});
    list.appendChild(row);
  });
  document.getElementById("hiit-save-btn").onclick=saveHiitCustom;document.getElementById("hiit-reset-btn").onclick=resetHiitCustom;modal.style.display="flex";
}
function saveHiitCustom(){
  const items=document.querySelectorAll("#hiit-pool-list [data-id]"),sel=[];
  items.forEach(el=>{if(el.getAttribute("data-sel")==="1")sel.push({id:el.getAttribute("data-id"),n:el.getAttribute("data-name"),pat:"HIIT",mat:"",desc:"",tip:"",week:{s:1,r:"40s"}});});
  if(sel.length>=2){localStorage.setItem("hiit_custom",JSON.stringify(sel));document.getElementById("hiit-modal").style.display="none";sH(rTab(),false);}else alert("Selecciona al menos 2.");
}
function resetHiitCustom(){localStorage.removeItem("hiit_custom");document.getElementById("hiit-modal").style.display="none";sH(rTab(),false);}
function toggleSportMenu(){
  const menu=document.getElementById("sport-menu");if(!menu)return;
  if(menu.classList.contains("show")){menu.classList.remove("show");return;}
  const sp=localStorage.getItem("sp_"+tstr);
  let html='<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:4px 8px 6px">Deporte hoy</div>';
  SPORTS.forEach(function(s){html+='<button class="sport-item'+(sp===s?' active':'')+'" onclick="logSportFab(this.dataset.sp)" data-sp="'+s+'">'+s+'</button>';});
  if(sp)html+='<button class="sport-item" style="color:var(--re)" onclick="logSportFab(this.dataset.sp)" data-sp="">Quitar</button>';
  menu.innerHTML=html;menu.classList.add("show");
}
function logSportFab(sport){if(sport)localStorage.setItem("sp_"+tstr,sport);else localStorage.removeItem("sp_"+tstr);document.getElementById("sport-menu").classList.remove("show");setTimeout(loadCalDots,100);sH(rTab(),true);}
function showWeeklySummary(){NAV_HISTORY.push({tab:ST.tab,dayView:ST.dayView});ST.tab="summary";document.querySelectorAll(".tbb").forEach(b=>b.classList.remove("on"));sH(rWeeklySummary(),false);}
function rWeeklySummary(){
  let h='<button class="btn btng" onclick="goBack()" style="margin-bottom:12px">Volver</button><div class="slbl">Resumen semanal</div><div class="card gl" style="padding:14px">';
  let sess=0,mob=0;const today=new Date(),dow=today.getDay()===0?6:today.getDay()-1;
  for(let i=0;i<=dow;i++){const d=new Date(today);d.setDate(today.getDate()-dow+i);const ds=d.toDateString();if(localStorage.getItem("completed_"+ds))sess++;if(localStorage.getItem("mob_completed_"+ds))mob++;}
  h+='<div style="font-size:28px;font-weight:800;color:var(--bl)">'+sess+'</div><div style="font-size:12px;color:var(--t3)">sesiones esta semana</div>';
  h+='<div style="font-size:20px;font-weight:700;color:var(--gr);margin-top:10px">'+mob+'</div><div style="font-size:12px;color:var(--t3)">dias con movilidad</div></div>';
  return h;
}

// App startup
setTimeout(loadCalDots,400);
setTimeout(initReminder,1000);
</script>
</body>
