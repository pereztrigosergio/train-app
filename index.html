<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#FAFAFA;color:#111}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative}
#hdr{padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 0;flex-shrink:0}
#cnt{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 14px 86px;-webkit-overflow-scrolling:touch}
#tb{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid rgba(0,0,0,0.08);padding:6px 0 calc(env(safe-area-inset-bottom,0px) + 6px);z-index:100}
.tb-inner{display:flex;justify-content:space-around}
.tbb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 10px;color:#999;font-size:10px;font-family:-apple-system,sans-serif}
.tbb.on{color:#007AFF}
.tbb svg{width:20px;height:20px;stroke-width:1.8}
.card{background:#fff;border-radius:14px;border:1px solid rgba(0,0,0,0.09);padding:14px;margin-bottom:10px}
.slbl{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;padding:14px 2px 7px}
.exc{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.09);padding:11px 12px;margin-bottom:7px;display:flex;gap:10px;cursor:pointer;transition:opacity .15s}
.exc:active{opacity:.6}
.exc.ok{opacity:.4}
.xn{font-size:13px;font-weight:600;flex:1;line-height:1.3}
.xn.ok{text-decoration:line-through;color:#999}
.xr{font-size:11px;font-weight:700;white-space:nowrap}
.xt{font-size:10px;padding:2px 7px;border-radius:6px;margin-right:4px;margin-top:4px;display:inline-block;border:1px solid rgba(0,0,0,0.07)}
.xd{font-size:11px;color:#666;margin-top:5px;line-height:1.55;display:none;border-top:1px solid rgba(0,0,0,0.06);padding-top:6px}
.xd.show{display:block}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;color:transparent;transition:all .2s}
.chk.ok{background:#007AFF;border-color:#007AFF;color:#fff}
.pb{height:3px;background:rgba(0,0,0,0.07);border-radius:99px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:99px;transition:width .4s}
.btn{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,0.1);background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:-apple-system,sans-serif;margin-bottom:7px;color:#111;text-align:center}
.btn:active{opacity:.7}
.btn-blue{background:#007AFF;color:#fff;border-color:#007AFF}
.btn-orange{background:#FF6B35;color:#fff;border-color:#FF6B35}
.btn-green{background:rgba(52,199,89,0.08);color:#1a7a38;border-color:rgba(52,199,89,0.25)}
.btn-red{color:#FF3B30;border-color:rgba(255,59,48,0.2)}
.mob-item{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.09);padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:opacity .15s}
.mob-item:active{opacity:.6}
.mob-item.ok{opacity:.4}
.mob-chk{width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent;transition:all .2s}
.mob-chk.ok{background:#34C759;border-color:#34C759;color:#fff}
.cal-lbl{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-lbl span{text-align:center;font-size:10px;font-weight:600;color:#999;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-d{display:flex;flex-direction:column;align-items:center;padding:5px 2px;border-radius:8px;cursor:pointer;border:1px solid transparent}
.cal-d.today{border-color:#007AFF;background:rgba(0,122,255,0.04)}
.cal-dn{font-size:12px;font-weight:500}
.cal-dot{width:5px;height:5px;border-radius:50%;margin-top:2px;background:transparent}
.dayr{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.09);padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.dayr.today{border-color:#007AFF}
.daydot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.frow{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.frow::-webkit-scrollbar{display:none}
.fbtn{padding:6px 14px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);background:#fff;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:-apple-system,sans-serif;color:#555}
.fbtn.on{background:#007AFF;color:#fff;border-color:#007AFF}
#modal{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.25)}
#modal.show{display:flex}
#modal-inner{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:0 0 calc(env(safe-area-inset-bottom,0px)+16px);max-height:80vh;overflow-y:auto}
.opt-row{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.06)}
.opt-row:active{background:rgba(0,0,0,0.03)}
.opt-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
@keyframes popin{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}60%{transform:translate(-50%,-50%) scale(1.05)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes fadeout{0%{opacity:1}100%{opacity:0}}
#cel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,0.09);padding:28px 36px;text-align:center;z-index:999;display:none;min-width:200px;box-shadow:0 8px 40px rgba(0,0,0,0.12)}
#cel.show{display:block;animation:popin .35s cubic-bezier(0.34,1.56,0.64,1) both}
#cel.hide{animation:fadeout .3s ease both}

#cel-t{font-size:16px;font-weight:700}
.sum-stat{text-align:center;padding:16px;flex:1}
.sum-num{font-size:32px;font-weight:800;color:#007AFF}
.sum-lbl{font-size:11px;color:#999;margin-top:2px}
.rc-item{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,0.09);padding:11px 12px;margin-bottom:7px;display:flex;gap:10px;cursor:pointer}
.rc-item.ok{opacity:.4}
#fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+78px);right:16px;width:48px;height:48px;border-radius:50%;background:#007AFF;color:#fff;border:none;font-size:24px;cursor:pointer;z-index:90;box-shadow:0 4px 14px rgba(0,122,255,0.35)}

<script>
const today=new Date();
const tstr=today.toDateString();
const DNAMES=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const sidx=today.getDay()===0?6:today.getDay()-1;
const SM={
  tf:{l:'Torso Fuerza',c:'#007AFF',bg:'rgba(0,122,255,0.07)'},
  pf:{l:'Pierna Fuerza',c:'#FF6B35',bg:'rgba(255,107,53,0.07)'},
  th:{l:'Torso Hipert.',c:'#AF52DE',bg:'rgba(175,82,222,0.07)'},
  ph:{l:'Pierna Hipert.',c:'#FF9F0A',bg:'rgba(255,159,10,0.07)'},
  co:{l:'Core & Prevención',c:'#34C759',bg:'rgba(52,199,89,0.07)'},
  hi:{l:'HIIT',c:'#FF3B30',bg:'rgba(255,59,48,0.07)'},
};
const DEFAULT_SCHED=['tf','pf','co','th','ph',null,null];
const SPORTS=['Fútbol','Pádel','Voleibol','Surf','Carrera','Ciclismo','Natación','Senderismo','Yoga/Pilates','Otro'];
const WEEK_LABELS=['Base','Carga','Pico','Ligera'];
const TOTAL_MESOS=6;

// ─── DUP VOLUME/INTENSITY SCHEME ──────────────────
// getLoad(week, meso, baseLoad) returns {sets, reps, rest}
// week: 1-4, meso: 1-6
// baseLoad: {s,r,rest} baseline (week1 meso1)
// Progressive overload: meso adds ~5% volume each cycle, week modulates intensity

function dupLoad(week, meso, type){
  // type: 'strength' or 'hyp'
  // Returns {sets, reps, rest} strings
  const mesoBoost = meso - 1; // 0-5 extra difficulty tiers

  if(type==='strength'){
    // Base: 4x6, Carga: 4x5, Pico: 5x4, Ligera: 3x6
    const schemes=[
      {w:1,s:4,r:6,rest:'2min'},
      {w:2,s:4,r:5,rest:'2min30s'},
      {w:3,s:5,r:4,rest:'3min'},
      {w:4,s:3,r:6,rest:'90s'},
    ];
    const base=schemes[week-1];
    // Meso progression: every 2 mesos add 1 set on weeks 1-3
    const extraSets=week<4?Math.floor(mesoBoost/2):0;
    return {sets:base.s+extraSets,reps:base.r,rest:base.rest};
  } else {
    // Hyp: Base 3x10, Carga 4x10, Pico 4x8, Ligera 2x12
    const schemes=[
      {w:1,s:3,r:10,rest:'75s'},
      {w:2,s:4,r:10,rest:'75s'},
      {w:3,s:4,r:8,rest:'90s'},
      {w:4,s:2,r:12,rest:'60s'},
    ];
    const base=schemes[week-1];
    const extraSets=week<4?Math.floor(mesoBoost/2):0;
    return {sets:base.s+extraSets,reps:base.r,rest:base.rest};
  }
}

function accLoad(week, meso, type){
  if(type==='strength'){
    const s=[{s:3,r:8},{s:3,r:7},{s:4,r:6},{s:2,r:8}];
    const base=s[week-1];
    return {sets:base.s,reps:base.r,rest:'90s'};
  } else {
    const s=[{s:3,r:12},{s:3,r:12},{s:4,r:10},{s:2,r:14}];
    const base=s[week-1];
    return {sets:base.s,reps:base.r,rest:'60s'};
  }
}

function coreLoad(week, meso){
  const s=[{s:3,r:'8/lado'},{s:3,r:'10/lado'},{s:4,r:'8/lado'},{s:2,r:'8/lado'}];
  const base=s[week-1];
  return {sets:base.s,reps:base.r,rest:'60s'};
}

function fmtLoad(load, perSide){
  const r = perSide ? load.reps+(typeof load.reps==='number'?'/lado':'') : load.reps;
  return load.sets+'x'+r;
}

// ─── EXERCISE DATABASE ─────────────────────────────
// v = 6 variants (L1-L6). r is computed dynamically from dupLoad.
// perSide: true if reps are per side

const SESS={

let ST={
  tab:'hoy',week:1,meso:1,
  sched:[...DEFAULT_SCHED],
  xlv:{},
  done:new Set(),mdone:new Set(),
  calM:today.getMonth(),calY:today.getFullYear(),
  progOpen:{},
};

function sv(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function gl(k){try{return localStorage.getItem(k);}catch(e){return null;}}

function init(){
  const sc=gl('sched2');if(sc)try{ST.sched=JSON.parse(sc);}catch(e){}
  const wk=gl('wk');if(wk)ST.week=parseInt(wk)||1;
  const ms=gl('meso');if(ms)ST.meso=parseInt(ms)||1;
  const xl=gl('xlv2');if(xl){try{ST.xlv=JSON.parse(xl);}catch(e){}}
  // Set default levels (L4 = index 3 for empuje, L3 = index 2 for rest)
  function defLv(id,lv){if(ST.xlv[id]===undefined)ST.xlv[id]=lv;}
  defLv('tf1',3);defLv('tf2',3);defLv('tf3',2);defLv('tf4',2); // empuje L4, tracción L3
  defLv('tf5',2);defLv('tf6',2);
  defLv('th1',3);defLv('th2',3);defLv('th3',2);defLv('th4',2);
  defLv('th5',2);defLv('th6',2);
  // Legs: all start L3 (index 2)
  ['pf1','pf2','pf3','pf4','pf5','ph1','ph2','ph3','ph4','ph5'].forEach(id=>defLv(id,2));
  // Core and accessories: L3
  [...CORE_POOL,...PF_ACC_POOL].forEach(ex=>defLv(ex.id,2));
  sv('xlv2',JSON.stringify(ST.xlv));
  const dn=gl('dn_'+tstr);if(dn)try{ST.done=new Set(JSON.parse(dn));}catch(e){}
  const md=gl('md_'+tstr);if(md)try{ST.mdone=new Set(JSON.parse(md));}catch(e){}
  render();
}

function render(){
  const hd=document.getElementById('hdr');
  document.getElementById('tb').style.display='block';
  hd.innerHTML='<div style="font-size:11px;font-weight:700;color:#999;letter-spacing:.05em">M'+ST.meso+'/'+TOTAL_MESOS+' · S'+ST.week+' · '+WEEK_LABELS[ST.week-1].toUpperCase()+'</div>'
    +'<div style="font-size:20px;font-weight:800;padding:2px 0 10px;color:#111">'+today.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})+'</div>';
  sH(rTab());updateFab();
}

function sH(h){const c=document.getElementById('cnt');if(c)c.innerHTML=h;}
function go(t){
  ST.tab=t;
  document.querySelectorAll('.tbb').forEach(b=>b.classList.remove('on'));
  const el=document.getElementById('tb-'+t);if(el)el.classList.add('on');
  sH(rTab());updateFab();
}
function updateFab(){document.getElementById('fab').style.display=ST.tab==='cal'?'block':'none';}
function rTab(){
  if(ST.tab==='hoy')return rHoy();
  if(ST.tab==='sem')return rSem();
  if(ST.tab==='mob')return rMob();
  if(ST.tab==='prog')return rProg();
  if(ST.tab==='cal')return rCal();
  if(ST.tab==='rc')return rRc();
  if(ST.tab==='cfg')return rCfg();
  return rHoy();
}

function getLv(id){return ST.xlv[id]!==undefined?ST.xlv[id]:2;}

function getVariant(ex){
  const lv=Math.min(getLv(ex.id),ex.v.length-1);
  return {name:ex.v[lv],lv:lv};
}

function getExReps(ex,sdata){
  const load=sdata.acc&&sdata.acc.includes(ex)?accLoad(ST.week,ST.meso,sdata.type):dupLoad(ST.week,ST.meso,sdata.type);
  const side=ex.perSide?'/lado':'';
  return load.sets+'x'+load.reps+side;
}

function getExRest(ex,sdata){
  const load=sdata.acc&&sdata.acc.includes(ex)?accLoad(ST.week,ST.meso,sdata.type):dupLoad(ST.week,ST.meso,sdata.type);
  return load.rest;
}

function getWeeklyItem(pool,seed){
  const idx=(ST.week-1+ST.meso-1+seed)%pool.length;
  return pool[Math.max(0,idx)];
}

function getDayExtras(sk){
  const isLeg=(sk==='pf'||sk==='ph');
  const core=getWeeklyItem(CORE_POOL,sk.charCodeAt(0)%5);
  let acc=null;
  if(isLeg){
    const pool=PF_ACC_POOL.filter(a=>!a.minMeso||a.minMeso<=ST.meso);
    acc=getWeeklyItem(pool,sk.charCodeAt(1)%pool.length);
  }
  return {core,acc};
}

// ── HOY ───────────────────────────────────────────
function rHoy(){
  const sk=ST.sched[sidx];
  let h='';
  const mobDone=MOB.filter(m=>ST.mdone.has(m.id)).length;
  h+='<div class="slbl">Mañana</div>';
  h+='<div class="card" style="display:flex;align-items:center;gap:10px;cursor:pointer;border-color:rgba(52,199,89,0.3)" onclick="go(\'mob\')">'
    +'<div style="width:36px;height:36px;border-radius:10px;background:rgba(52,199,89,0.08);display:flex;align-items:center;justify-content:center;font-size:18px">☀️</div>'
    +'<div style="flex:1"><div style="font-size:13px;font-weight:600">Movilidad matutina</div>'
    +'<div style="font-size:11px;color:#999">'+mobDone+'/'+MOB.length+' completados</div></div>'
    +'<div style="font-size:18px;color:#999">›</div></div>';

  if(!sk){
    h+='<div style="text-align:center;padding:32px 16px">'
      +'<div style="font-size:48px;margin-bottom:14px">🌙</div>'
      +'<div style="font-size:18px;font-weight:800;margin-bottom:8px">Día de descanso</div>'
      +'<div style="font-size:13px;color:#999;line-height:1.7;margin-bottom:20px">El descanso es donde el cuerpo crece.<br>Recupera hoy y vuelves más fuerte.</div>'
      +'<button class="btn btn-green" onclick="showRc(\'all\')">🧘 Recuperación activa</button>'
      +'<button class="btn" onclick="showRc(\'espalda_dolor\')" style="color:#FF3B30;border-color:rgba(255,59,48,0.2)">🔴 Espalda — aliviar dolor</button>'
      +'<button class="btn" onclick="showRc(\'espalda_prev\')">Espalda — prevención</button></div>';
    return h;
  }

  const sdata=SESS[sk];
  const extras=getDayExtras(sk);
  const allIds=[...sdata.base.map(e=>e.id),...sdata.acc.map(e=>e.id),extras.core.id];
  if(extras.acc)allIds.push(extras.acc.id);
  const done=allIds.filter(id=>ST.done.has(id)).length;
  const pct=Math.round(done/allIds.length*100);
  const comp=gl('completed_'+tstr)===sk;

  h+='<div class="slbl">Sesión de hoy</div>';
  h+='<div class="card" style="border-color:'+sdata.color+'">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
    +'<div style="width:8px;height:8px;border-radius:50%;background:'+sdata.color+'"></div>'
    +'<div style="font-size:14px;font-weight:700">'+sdata.name+'</div>'
    +'<div style="font-size:11px;color:#999;margin-left:auto">M'+ST.meso+' S'+ST.week+' '+WEEK_LABELS[ST.week-1]+'</div></div>'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:5px">'
    +'<span style="font-size:11px;color:#999">Progreso</span>'
    +'<span style="font-size:11px;font-weight:700;color:'+sdata.color+'">'+done+'/'+allIds.length+'</span></div>'
    +'<div class="pb"><div class="pf" style="width:'+pct+'%;background:'+sdata.color+'"></div></div></div>';

  h+='<div class="slbl">Ejercicios base</div>';
  h+=renderExList(sdata.base,sdata,false);
  if(sdata.acc.length){h+='<div class="slbl">Accesorios</div>';h+=renderExList(sdata.acc,sdata,true);}
  if(extras.acc){h+='<div class="slbl">Complementario rotativo</div>';h+=renderExListSingle(extras.acc,sdata);}
  h+='<div class="slbl">Core rotativo</div>';
  h+=renderExListSingle(extras.core,sdata);

  h+='<button class="btn '+(comp?'btn-green':'btn-orange')+'" style="margin-top:4px" onclick="markCompleted(\''+sk+'\')">'
    +(comp?'✓ Completado — pulsa para desmarcar':'Marcar entrenamiento como completado')+'</button>';
  h+='<button class="btn" onclick="postponeDay()" style="color:#999;font-size:12px">Mover al próximo día de descanso</button>';
  return h;
}

function renderExList(exs,sdata,isAcc){
  return exs.map(ex=>renderExCard(ex,sdata,isAcc)).join('');

function toggleDesc(id){const el=document.getElementById('xd_'+id);if(el)el.classList.toggle('show');}
function tapEx(id){
  if(ST.done.has(id))ST.done.delete(id);else ST.done.add(id);
  sv('dn_'+tstr,JSON.stringify([...ST.done]));sH(rTab());
}

function markCompleted(sk){
  const key='completed_'+tstr;
  if(gl(key)===sk){localStorage.removeItem(key);ST.done=new Set();sv('dn_'+tstr,'[]');}
  else{
    const sdata=SESS[sk];const extras=getDayExtras(sk);
    [...sdata.base,...sdata.acc].forEach(e=>ST.done.add(e.id));
    ST.done.add(extras.core.id);if(extras.acc)ST.done.add(extras.acc.id);
    sv('dn_'+tstr,JSON.stringify([...ST.done]));sv(key,sk);
    showCel('💪','¡Sesión completada!');
  }
  sH(rTab());
}

function postponeDay(){
  for(let d=sidx+1;d<7;d++){
    if(!ST.sched[d]){const tmp=ST.sched[sidx];ST.sched[sidx]=null;ST.sched[d]=tmp;sv('sched2',JSON.stringify(ST.sched));sH(rTab());return;}
  }
  alert('No hay día de descanso disponible esta semana.');
}

function showCel(ico,txt){
  const el=document.getElementById('cel');
  document.getElementById('cel-ico').textContent=ico;
  document.getElementById('cel-t').textContent=txt;
  el.className='show';
  setTimeout(()=>{el.className='hide';setTimeout(()=>{el.className='';},300);},2200);
}

// ── SEMANA ─────────────────────────────────────────
function rSem(){
  let h='<div class="slbl">Esta semana — S'+ST.week+' '+WEEK_LABELS[ST.week-1]+'</div>';
  for(let i=0;i<7;i++){
    const sk=ST.sched[i];const sm=sk?SM[sk]:null;const sdata=sk?SESS[sk]:null;
    const isT=i===sidx;
    const d=new Date(today);d.setDate(today.getDate()-sidx+i);
    const ds=d.toDateString();const comp=gl('completed_'+ds);
    h+='<div class="dayr'+(isT?' today':'')+'" onclick="toggleDayDetail('+i+')" id="dayrow-'+i+'">'
      +'<div class="daydot" style="background:'+(sm?sm.bg:'rgba(0,0,0,0.04)')+';color:'+(sm?sm.c:'#ccc')+'">'+DNAMES[i].slice(0,2)+'</div>'
      +'<div style="flex:1">'
      +'<div style="font-size:13px;font-weight:600">'+DNAMES[i]+(isT?' <span style="font-size:10px;background:rgba(0,122,255,0.1);color:#007AFF;padding:1px 7px;border-radius:99px">Hoy</span>':'')+'</div>'
      +'<div style="font-size:11px;color:#999;margin-top:1px">'+(sdata?sdata.name:'Descanso')+'</div></div>'
      +(comp?'<span style="font-size:16px">✅</span>':'')
      +'<button onclick="event.stopPropagation();openSessModal('+i+')" style="background:rgba(0,0,0,0.05);border:1px solid rgba(0,0,0,0.08);border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;color:#555;font-family:-apple-system,sans-serif;flex-shrink:0">✏️</button>'
      +'</div>'
      +'<div id="detail-'+i+'" style="display:none;padding:0 0 4px"></div>';
  }
  return h;
}

function toggleDayDetail(i){
  const det=document.getElementById('detail-'+i);if(!det)return;
  if(det.style.display==='block'){det.style.display='none';return;}
  document.querySelectorAll('[id^="detail-"]').forEach(d=>d.style.display='none');
  const sk=ST.sched[i];
  if(!sk){det.innerHTML='<div style="font-size:12px;color:#999;padding:8px 4px">Día de descanso.</div>';}
  else{
    const sdata=SESS[sk];const extras=getDayExtras(sk);
    const load=dupLoad(ST.week,ST.meso,sdata.type);
    let html='<div style="padding:6px 4px">';
    [...sdata.base,...sdata.acc].forEach(ex=>{
      const {name,lv}=getVariant(ex);
      const side=ex.perSide?'/lado':'';
      html+='<div style="font-size:12px;padding:3px 0;display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,0.05)">'
        +'<span style="color:#444">'+name+'</span>'
        +'<span style="color:'+sdata.color+';font-weight:600">'+load.sets+'x'+load.reps+side+'</span></div>';
    });
    const cl=coreLoad(ST.week,ST.meso);
    const clv=Math.min(getLv(extras.core.id),extras.core.v.length-1);
    html+='<div style="font-size:12px;padding:3px 0;display:flex;justify-content:space-between;color:#999">'
      +'<span>'+extras.core.v[clv]+' (core)</span><span>'+cl.sets+'x'+cl.reps+(extras.core.perSide?'/lado':'')+'</span></div>';
    if(extras.acc){
      const alv=Math.min(getLv(extras.acc.id),extras.acc.v.length-1);
      html+='<div style="font-size:12px;padding:3px 0;display:flex;justify-content:space-between;color:#999">'
        +'<span>'+extras.acc.v[alv]+' (compl.)</span><span>'+cl.sets+'x'+cl.reps+(extras.acc.perSide?'/lado':'')+'</span></div>';
    }
    html+='</div>';
    det.innerHTML=html;
  }
  det.style.display='block';
}

function openSessModal(dayIdx){
  document.getElementById('modal-title').textContent='Cambiar — '+DNAMES[dayIdx];
  const cur=ST.sched[dayIdx];let html='';
  Object.keys(SM).forEach(sk=>{
    const sm=SM[sk];const sdata=SESS[sk];const isC=cur===sk;
    html+='<div class="opt-row" onclick="setSess('+dayIdx+',\''+sk+'\')">'
      +'<div class="opt-dot" style="background:'+sm.c+'"></div>'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:'+(isC?'700':'400')+';color:'+(isC?sm.c:'#111')+'">'+sdata.name+'</div></div>'
      +(isC?'<span style="color:'+sm.c+'">✓</span>':'')+'</div>';
  });
  html+='<div class="opt-row" onclick="setSess('+dayIdx+',null)"><div class="opt-dot" style="background:#ccc"></div>'
    +'<div style="flex:1"><div style="font-size:13px;font-weight:'+(cur===null?'700':'400')+'">Descanso</div></div>'+(cur===null?'<span>✓</span>':'')+'</div>';
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}
function setSess(dayIdx,sk){ST.sched[dayIdx]=sk;sv('sched2',JSON.stringify(ST.sched));closeModal();sH(rSem());}
function closeModal(){document.getElementById('modal').classList.remove('show');}

// ── MOVILIDAD ──────────────────────────────────────
function rMob(){
  const done=MOB.filter(m=>ST.mdone.has(m.id)).length;
  let h='<div class="slbl">Movilidad matutina</div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:13px;font-weight:600">'+done+'/'+MOB.length+' completados</span>'
    +'<button class="btn btn-green" style="width:auto;padding:6px 14px;margin:0;font-size:12px" onclick="completeAllMob()">'+(done===MOB.length?'↺ Desmarcar todo':'✓ Completar todo')+'</button></div>'
    +'<div class="pb"><div class="pf" style="width:'+Math.round(done/MOB.length*100)+'%;background:#34C759"></div></div></div>';
  h+='<div class="frow">'
    +'<button class="fbtn on" onclick="switchMob(\'main\',this)">Movilidad</button>'
    +'<button class="fbtn" onclick="switchMob(\'espalda_prev\',this)">Espalda prevención</button>'
    +'<button class="fbtn" onclick="switchMob(\'espalda_dolor\',this)" style="border-color:rgba(255,59,48,0.3);color:#FF3B30">🔴 Espalda dolor</button>'
    +'</div><div id="mob-list">'+buildMobList(MOB,'#34C759')+'</div>';
  return h;
}
function buildMobList(items,color){
  return items.map(m=>{
    const ok=ST.mdone.has(m.id);
    return '<div class="mob-item'+(ok?' ok':'')+'" onclick="tapMob(\''+m.id+'\')">'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:600">'+m.n+'</div>'
      +'<div style="font-size:11px;color:#999;margin-top:2px;line-height:1.4">'+m.desc+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0"><div style="font-size:11px;font-weight:700;color:'+color+'">'+m.r+'</div>'
      +'<div class="mob-chk'+(ok?' ok':'')+'">✓</div></div></div>';
  }).join('');
}
let CUR_MOB_TYPE='main';
function switchMob(type,btn){
  CUR_MOB_TYPE=type;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const list=document.getElementById('mob-list');if(!list)return;
  if(type==='main')list.innerHTML=buildMobList(MOB,'#34C759');
  else if(type==='espalda_prev')list.innerHTML='<div style="background:rgba(0,122,255,0.05);border:1px solid rgba(0,122,255,0.15);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#007AFF">Protocolo de fortalecimiento lumbar — sin dolor activo.</div>'+buildMobList(MOB_EXTRA.espalda_prev,'#007AFF');
  else list.innerHTML='<div style="background:rgba(255,59,48,0.05);border:1px solid rgba(255,59,48,0.15);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#FF3B30">⚠️ Con dolor agudo repite 2-3 veces al día.</div>'+buildMobList(MOB_EXTRA.espalda_dolor,'#FF3B30');
}
function tapMob(id){
  if(ST.mdone.has(id))ST.mdone.delete(id);else ST.mdone.add(id);
  sv('md_'+tstr,JSON.stringify([...ST.mdone]));
  if(MOB.every(m=>ST.mdone.has(m.id)))sv('mob_completed_'+tstr,'1');
  else localStorage.removeItem('mob_completed_'+tstr);
  const list=document.getElementById('mob-list');if(!list)return;
  if(CUR_MOB_TYPE==='main')list.innerHTML=buildMobList(MOB,'#34C759');
  else if(CUR_MOB_TYPE==='espalda_prev')list.innerHTML=buildMobList(MOB_EXTRA.espalda_prev,'#007AFF');
  else list.innerHTML=buildMobList(MOB_EXTRA.espalda_dolor,'#FF3B30');
  const done=MOB.filter(m=>ST.mdone.has(m.id)).length;
  const span=document.querySelector('#cnt .card span');if(span)span.textContent=done+'/'+MOB.length+' completados';
}
function completeAllMob(){
  if(MOB.every(m=>ST.mdone.has(m.id)))MOB.forEach(m=>ST.mdone.delete(m.id));
  else{MOB.forEach(m=>ST.mdone.add(m.id));showCel('☀️','¡Movilidad completada!');}
  sv('md_'+tstr,JSON.stringify([...ST.mdone]));
  // Also mark mob_completed for calendar dot
  if(MOB.every(m=>ST.mdone.has(m.id)))sv('mob_completed_'+tstr,'1');
  else localStorage.removeItem('mob_completed_'+tstr);
  sH(rMob());
}

// ── RECOVERY ───────────────────────────────────────
function showRc(type){ST._rc=type;ST.tab='rc';sH(rRc());}
function rRc(){
  const type=ST._rc||'all';
  let items=[],title='Recuperación activa',color='#34C759';
  if(type==='espalda_dolor'){items=MOB_EXTRA.espalda_dolor;title='Espalda — aliviar dolor';color='#FF3B30';}
  else if(type==='espalda_prev'){items=MOB_EXTRA.espalda_prev;title='Espalda — prevención';color='#007AFF';}
  else items=[...MOB_EXTRA.espalda_dolor.slice(0,3),...MOB_EXTRA.espalda_prev.slice(0,3)];
  const done=items.filter(e=>ST.done.has('rc_'+e.id)).length;
  let h='<button class="btn" onclick="go(\'hoy\')" style="color:#007AFF;border-color:rgba(0,122,255,0.2)">← Volver</button>';
  h+='<div class="slbl">'+title+'</div>';
  if(type==='espalda_dolor')h+='<div style="background:rgba(255,59,48,0.05);border:1px solid rgba(255,59,48,0.15);border-radius:12px;padding:11px 13px;margin-bottom:10px;font-size:12px;color:#FF3B30;line-height:1.6">⚠️ Si el dolor se irradia hacia la pierna o llevas más de 72h, consulta con un profesional.<br><br>🔁 <strong>Repite 2-3 veces hoy</strong> en sesiones de 10-15 minutos.</div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<span style="font-size:13px;font-weight:600">'+done+'/'+items.length+' completados</span>'
    +'<button class="btn" style="width:auto;padding:5px 12px;margin:0;font-size:12px;background:'+color+';color:#fff;border-color:'+color+'" onclick="completeAllRc()">Completar todo</button></div>'
    +'<div class="pb"><div class="pf" style="width:'+Math.round(done/items.length*100)+'%;background:'+color+'"></div></div></div>';
  items.forEach(ex=>{
    const ok=ST.done.has('rc_'+ex.id);
    h+='<div class="rc-item'+(ok?' ok':'')+'" onclick="tapRcEx(\''+ex.id+'\')">'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:600">'+ex.n+'</div>'
      +'<div style="font-size:11px;color:#999;margin-top:3px;line-height:1.5">'+ex.desc+'</div>'
      +'<div style="font-size:11px;color:#007AFF;margin-top:3px">💡 '+ex.tip+'</div></div>'
      +'<div style="flex-shrink:0;text-align:right"><div style="font-size:11px;font-weight:700;color:'+color+'">'+ex.r+'</div>'
      +'<div class="mob-chk'+(ok?' ok':'')+'">✓</div></div></div>';
  });
  return h;
}
function tapRcEx(id){
  const k='rc_'+id;if(ST.done.has(k))ST.done.delete(k);else ST.done.add(k);
  sv('dn_'+tstr,JSON.stringify([...ST.done]));sH(rRc());
}
function completeAllRc(){
  const type=ST._rc||'all';let items=[];
  if(type==='espalda_dolor')items=MOB_EXTRA.espalda_dolor;
  else if(type==='espalda_prev')items=MOB_EXTRA.espalda_prev;
  else items=[...MOB_EXTRA.espalda_dolor.slice(0,3),...MOB_EXTRA.espalda_prev.slice(0,3)];
  const allDone=items.every(e=>ST.done.has('rc_'+e.id));
  if(allDone)items.forEach(e=>ST.done.delete('rc_'+e.id));
  else{items.forEach(e=>ST.done.add('rc_'+e.id));showCel('🧘','¡Recuperación completada!');}
  sv('dn_'+tstr,JSON.stringify([...ST.done]));sH(rRc());
}

// ── PROGRESO ───────────────────────────────────────

const MEDIDAS_KEYS=['Pecho','Cintura','Cadera','Glúteo','Muslo der.','Muslo izq.','Brazo der.','Brazo izq.','Pantorrilla'];

function getMedidasSummary(){
  const last=gl('medidas_last');
  if(!last)return 'Sin registros aún — pulsa para añadir';
  const d=new Date(JSON.parse(last).date);
  return 'Último registro: '+d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
}

function openMedidas(){
  document.getElementById('modal-title').textContent='Medidas corporales';
  let records=[];try{records=JSON.parse(gl('medidas_records')||'[]');}catch(e){}
  const lastRecord=records[records.length-1]||{};
  let html='<div style="padding:12px 16px">';
  html+='<div style="font-size:12px;color:#999;margin-bottom:12px">Registra tus medidas en cm. Guarda para comparar evolución.</div>';
  MEDIDAS_KEYS.forEach(function(k){
    const last=lastRecord.data&&lastRecord.data[k]?lastRecord.data[k]:'';
    html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'
      +'<div style="font-size:13px;font-weight:600;flex:1">'+k+'</div>'
      +'<input type="number" id="med_'+k.replace(/[^a-z]/gi,"_")+'" placeholder="'+(last?last:'cm')+'" value="'+(last||'')+'" style="width:80px;padding:7px 10px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);font-size:13px;text-align:center;font-family:-apple-system,sans-serif">'
      +'</div>';
  });
  if(records.length>0){
    html+='<div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px">Historial</div>';
    records.slice().reverse().slice(0,5).forEach(function(rec){
      const d=new Date(rec.date);
      html+='<div style="font-size:11px;color:#666;padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.06)">'
        +d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'})+' — '
        +MEDIDAS_KEYS.filter(function(k){return rec.data[k];}).map(function(k){return k+': <strong>'+rec.data[k]+'</strong>';}).join(', ')
        +'</div>';
    });
  }
  html+='<button class="btn btn-blue" style="margin-top:14px" onclick="saveMedidas()">Guardar medidas</button>';
  html+='</div>';
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}

function saveMedidas(){
  const data={};
  MEDIDAS_KEYS.forEach(function(k){
    const el=document.getElementById('med_'+k.replace(/[^a-z]/gi,"_"));
    if(el&&el.value)data[k]=parseFloat(el.value);
  });
  if(Object.keys(data).length===0){alert('Introduce al menos una medida.');return;}
  let records=[];try{records=JSON.parse(gl('medidas_records')||'[]');}catch(e){}
  const record={date:new Date().toISOString(),data:data};
  records.push(record);
  sv('medidas_records',JSON.stringify(records));
  sv('medidas_last',JSON.stringify(record));
  closeModal();
  showCel('📏','Medidas guardadas');
  sH(rProg());
}
function rProg(){
  let h='';
  if(sidx===6){
    let sess=0,mob=0;
    for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-6+i);const ds=d.toDateString();if(gl('completed_'+ds))sess++;if(gl('md_'+ds))mob++;}
    h+='<div class="slbl">Resumen semanal</div>';
    h+='<div class="card" style="display:flex"><div class="sum-stat"><div class="sum-num">'+sess+'</div><div class="sum-lbl">sesiones</div></div>'
      +'<div style="width:1px;background:rgba(0,0,0,0.08);margin:12px 0"></div>'
      +'<div class="sum-stat"><div class="sum-num" style="color:#34C759">'+mob+'</div><div class="sum-lbl">movilidades</div></div></div>';
  }
  if(ST.meso>=TOTAL_MESOS&&ST.week===4){
    h+='<div class="card" style="background:rgba(255,107,53,0.06);border-color:rgba(255,107,53,0.3);text-align:center;padding:20px">'
      +'<div style="font-size:32px;margin-bottom:8px">🏆</div>'
      +'<div style="font-size:15px;font-weight:800;margin-bottom:6px">¡Programa completado!</div>'
      +'<div style="font-size:12px;color:#666;line-height:1.6">Has terminado los 6 mesociclos (24 semanas).<br>Vuelve aquí para crear tu siguiente bloque.</div></div>';
  }
  h+='<div class="slbl">Medidas corporales</div>';
  h+='<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:10px" onclick="openMedidas()">'
    +'<div style="width:36px;height:36px;border-radius:10px;background:rgba(0,122,255,0.08);display:flex;align-items:center;justify-content:center;font-size:18px">📏</div>'
    +'<div style="flex:1"><div style="font-size:13px;font-weight:600">Registrar medidas</div>'
    +'<div style="font-size:11px;color:#999;margin-top:2px">'+getMedidasSummary()+'</div></div>'
    +'<div style="font-size:18px;color:#999">›</div></div>';
  h+='<div class="slbl">Niveles · M'+ST.meso+'/'+TOTAL_MESOS+' S'+ST.week+'</div>';
  const cats=Object.keys(SESS).filter(sk=>sk!=='hi'&&sk!=='co');
  cats.forEach(sk=>{
    const sdata=SESS[sk];
    const allExs=[...sdata.base,...sdata.acc];
    const isOpen=!!ST.progOpen[sk];
    h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">'
      +'<div onclick="toggleProg(\''+sk+'\')" style="display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer">'
      +'<div style="width:8px;height:8px;border-radius:50%;background:'+sdata.color+'"></div>'
      +'<div style="font-size:13px;font-weight:700;flex:1">'+sdata.name+'</div>'
      +'<div style="font-size:18px;color:#999">'+(isOpen?'∧':'∨')+'</div></div>';
    if(isOpen){
      h+='<div style="padding:0 14px 14px">';
      allExs.forEach(ex=>{h+=renderProgItem(ex,sdata.color);});
      h+='</div>';
    }
    h+='</div>';
  });
  h+='<div class="card" style="padding:0;overflow:hidden">'
    +'<div onclick="toggleProg(\'core\')" style="display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer">'
    +'<div style="width:8px;height:8px;border-radius:50%;background:#555"></div>'
    +'<div style="font-size:13px;font-weight:700;flex:1">Core (rotativo)</div>'
    +'<div style="font-size:18px;color:#999">'+(ST.progOpen.core?'∧':'∨')+'</div></div>';
  if(ST.progOpen.core){h+='<div style="padding:0 14px 14px">';CORE_POOL.forEach(ex=>{h+=renderProgItem(ex,'#555');});h+='</div>';}
  h+='</div>';
  return h;
}

function renderProgItem(ex,color){
  const lv=Math.min(getLv(ex.id),ex.v.length-1);
  let h='<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(0,0,0,0.06)">'
    +'<div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">'+ex.pat+'</div>'
    +'<div style="display:flex;gap:4px;margin-bottom:8px">';
  for(let i=0;i<ex.v.length;i++)h+='<div style="flex:1;height:4px;border-radius:99px;background:'+(i<=lv?color:'rgba(0,0,0,0.08)')+'"></div>';
  h+='</div>';
  if(lv>0)h+='<div style="font-size:11px;color:#999;margin-bottom:3px">Anterior: '+ex.v[lv-1]+'</div>';
  h+='<div style="font-size:13px;font-weight:700;color:'+color+';margin-bottom:3px">▸ '+ex.v[lv]+' <span style="font-weight:400;color:#999;font-size:11px">Nivel '+(lv+1)+'/6</span></div>';
  if(lv<ex.v.length-1)h+='<div style="font-size:11px;color:#999;margin-bottom:8px">Siguiente: '+ex.v[lv+1]+'</div>';
  else h+='<div style="font-size:11px;color:#34C759;margin-bottom:8px">🏆 Nivel máximo</div>';
  h+='<div style="display:flex;gap:6px">';
  if(lv>0)h+='<button onclick="setLv(\''+ex.id+'\','+(lv-1)+')" style="flex:1;padding:7px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);background:#fff;font-size:11px;cursor:pointer;font-family:-apple-system,sans-serif">← Bajar</button>';
  if(lv<ex.v.length-1)h+='<button onclick="setLv(\''+ex.id+'\','+(lv+1)+')" style="flex:1;padding:7px;border-radius:8px;border:1px solid '+color+';background:rgba(0,0,0,0.01);color:'+color+';font-size:11px;cursor:pointer;font-family:-apple-system,sans-serif">Subir →</button>';
  h+='</div></div>';
  return h;
}

function toggleProg(sk){ST.progOpen[sk]=!ST.progOpen[sk];sH(rProg());}
function setLv(id,lv){ST.xlv[id]=lv;sv('xlv2',JSON.stringify(ST.xlv));sH(rProg());}

// ── CALENDARIO ─────────────────────────────────────
function rCal(){
  const y=ST.calY,m=ST.calM;
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  let h='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 2px 14px">'
    +'<button onclick="calNav(-1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:#007AFF;padding:0 8px">‹</button>'
    +'<div style="font-size:15px;font-weight:700">'+months[m]+' '+y+'</div>'
    +'<button onclick="calNav(1)" style="background:none;border:none;font-size:22px;cursor:pointer;color:#007AFF;padding:0 8px">›</button></div>';
  h+='<div class="card" style="margin-bottom:12px;text-align:center">'
    +'<div style="font-size:11px;color:#999">Mesociclo '+ST.meso+'/'+TOTAL_MESOS+'</div>'
    +'<div style="font-size:16px;font-weight:800;margin-top:2px">Semana '+ST.week+' — '+WEEK_LABELS[ST.week-1]+'</div>'
    +'<div style="display:flex;gap:4px;margin-top:10px">';
  for(let w=1;w<=4;w++)h+='<div style="flex:1;height:4px;border-radius:99px;background:'+(w<=ST.week?'#007AFF':'rgba(0,0,0,0.08)')+'"></div>';
  h+='</div></div>';
  h+='<div class="cal-lbl">';['L','M','X','J','V','S','D'].forEach(d=>h+='<span>'+d+'</span>');h+='</div><div class="cal-grid">';
  const first=new Date(y,m,1).getDay();const off=first===0?6:first-1;const days=new Date(y,m+1,0).getDate();
  for(let i=0;i<off;i++)h+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=new Date(y,m,d).toDateString();const isT=ds===tstr;
    const comp=gl('completed_'+ds);const sport=gl('sport_'+ds);const mob=gl('mob_completed_'+ds)||gl('md_'+ds);
    const sm=comp&&SM[comp]?SM[comp]:null;const isFuture=new Date(y,m,d)>today;
    let dotColor='transparent';
    if(sm)dotColor=sm.c;
    else if(mob)dotColor='#34C759';
    else if(sport)dotColor='#FF9F0A';
    h+='<div class="cal-d'+(isT?' today':'')+'" onclick="'+(isFuture?'':'calDay(\''+ds+'\')')+'" style="'+(isFuture?'opacity:.35':'cursor:pointer')+'">'
      +'<div class="cal-dn" style="font-weight:'+(isT?'800':'400')+';color:'+(isT?'#007AFF':'')+'">'+d+'</div>'
      +'<div class="cal-dot" style="background:'+dotColor+'"></div></div>';
  }
  h+='</div>';
  h+='<div style="display:flex;gap:12px;padding:14px 2px;flex-wrap:wrap">';
  Object.keys(SM).forEach(sk=>h+='<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:'+SM[sk].c+'"></div><div style="font-size:10px;color:#999">'+SESS[sk].name+'</div></div>');
  h+='<div style="display:flex;align-items:center;gap:5px"><div style="width:8px;height:8px;border-radius:50%;background:#34C759"></div><div style="font-size:10px;color:#999">Movilidad/Deporte</div></div></div>';
  return h;
}
function calNav(dir){ST.calM+=dir;if(ST.calM>11){ST.calM=0;ST.calY++;}else if(ST.calM<0){ST.calM=11;ST.calY--;}sH(rCal());}

function calDay(ds){
  const comp=gl('completed_'+ds);const mob=gl('mob_completed_'+ds)||gl('md_'+ds);const sport=gl('sport_'+ds);
  const d=new Date(ds);const dayName=DNAMES[d.getDay()===0?6:d.getDay()-1];
  let h='<button class="btn" onclick="sH(rCal())" style="color:#007AFF;border-color:rgba(0,122,255,0.2)">← Volver</button>';
  h+='<div class="slbl">'+dayName+', '+d.toLocaleDateString('es-ES',{day:'numeric',month:'long'})+'</div>';
  h+='<div class="card"><div style="font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Entrenamiento</div>';
  Object.keys(SM).forEach(sk=>{
    const sdata=SESS[sk];const sm=SM[sk];const isC=comp===sk;
    h+='<div onclick="toggleCalSess(\''+ds+'\',\''+sk+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:6px;background:'+(isC?sm.bg:'rgba(0,0,0,0.03)')+';cursor:pointer;border:1px solid '+(isC?sm.c+'44':'rgba(0,0,0,0.06)')+'">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+sm.c+'"></div>'
      +'<div style="flex:1;font-size:13px;font-weight:'+(isC?'700':'400')+';color:'+(isC?sm.c:'#111')+'">'+sdata.name+'</div>'
      +(isC?'<span style="color:'+sm.c+'">✓</span>':'')+'</div>';
  });
  h+='</div><div class="card"><div style="font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Movilidad</div>'
    +'<div onclick="toggleCalMob(\''+ds+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:'+(mob?'rgba(52,199,89,0.08)':'rgba(0,0,0,0.03)')+';cursor:pointer;border:1px solid '+(mob?'rgba(52,199,89,0.3)':'rgba(0,0,0,0.06)')+'">'
    +'<div style="width:10px;height:10px;border-radius:50%;background:#34C759"></div>'
    +'<div style="flex:1;font-size:13px;font-weight:'+(mob?'700':'400')+';color:'+(mob?'#1a7a38':'#111')+'">Movilidad matutina</div>'
    +(mob?'<span style="color:#34C759">✓</span>':'')+'</div></div>';
  if(sport)h+='<div class="card"><div style="font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Deporte</div><div style="font-size:13px;font-weight:600">🏃 '+sport+'</div></div>';
  sH(h);
}
function toggleCalSess(ds,sk){const cur=gl('completed_'+ds);if(cur===sk)localStorage.removeItem('completed_'+ds);else sv('completed_'+ds,sk);calDay(ds);}
function toggleCalMob(ds){const k='mob_completed_'+ds;if(gl(k))localStorage.removeItem(k);else sv(k,'1');calDay(ds);}
function openSportModal(){
  document.getElementById('modal-title').textContent='Registrar deporte — hoy';
  let html='';SPORTS.forEach(sp=>{html+='<div class="opt-row" onclick="logSport(\''+sp+'\')"><div style="flex:1;font-size:13px">'+sp+'</div></div>';});
  document.getElementById('modal-body').innerHTML=html;document.getElementById('modal').classList.add('show');
}
function logSport(sp){sv('sport_'+tstr,sp);closeModal();sH(rCal());showCel('🏃','Deporte registrado');}

// ── AJUSTES ────────────────────────────────────────
function rCfg(){
  let h='<div class="slbl">Programa</div>';
  h+='<div class="card">'
    +'<div style="font-size:12px;color:#999;margin-bottom:4px">Mesociclo</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    +'<div style="font-size:22px;font-weight:800;flex:1">'+ST.meso+' <span style="font-size:13px;font-weight:400;color:#999">de '+TOTAL_MESOS+'</span></div>'
    +'<button onclick="changeMeso(-1)" style="width:34px;height:34px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);background:#fff;font-size:18px;cursor:pointer">−</button>'
    +'<button onclick="changeMeso(1)" style="width:34px;height:34px;border-radius:10px;border:1px solid #007AFF;background:#007AFF;color:#fff;font-size:18px;cursor:pointer">+</button></div>'
    +'<div style="font-size:12px;color:#999;margin-bottom:6px">Semana del mesociclo — <strong>'+WEEK_LABELS[ST.week-1]+'</strong></div>'
    +'<div style="display:flex;gap:6px">';
  for(let w=1;w<=4;w++)h+='<button onclick="setWeek('+w+')" style="flex:1;padding:10px 4px;border-radius:10px;border:1px solid '+(ST.week===w?'#007AFF':'rgba(0,0,0,0.1)')+';background:'+(ST.week===w?'#007AFF':'#fff')+';color:'+(ST.week===w?'#fff':'#111')+';font-size:12px;font-weight:700;cursor:pointer;font-family:-apple-system,sans-serif">'+(w===4?'Lig':w)+'</button>';
  h+='</div></div>';
  h+='<div class="slbl">Datos</div><div class="card">'
    +'<button class="btn btn-blue" onclick="exportData()">Exportar progreso</button>'
    +'<button class="btn" onclick="importData()">Importar progreso</button>'
    +'<button class="btn btn-red" onclick="resetApp()">Reiniciar app</button></div>';
  h+='<div style="text-align:center;padding:16px;font-size:11px;color:#ccc">Train. v2.3.0</div>';
  return h;
}

function setWeek(w){ST.week=w;sv('wk',String(w));render();}
function changeMeso(d){ST.meso=Math.max(1,Math.min(TOTAL_MESOS,ST.meso+d));sv('meso',String(ST.meso));render();}

function exportData(){
  const d={ver:'2.3.0',ST:{...ST,done:[...ST.done],mdone:[...ST.mdone]},ls:{}};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)d.ls[k]=gl(k);}
  const el=document.createElement('textarea');el.value=JSON.stringify(d);
  document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
  alert('Progreso copiado al portapapeles. Guárdalo en Notas.');
}
function importData(){
  const s=prompt('Pega tu código de progreso:');if(!s)return;
  try{const d=JSON.parse(s);if(d.ls)Object.keys(d.ls).forEach(k=>sv(k,d.ls[k]));alert('Progreso restaurado.');location.reload();}
  catch(e){alert('Código inválido.');}
}
function resetApp(){if(confirm('¿Borrar todo el progreso?')){localStorage.clear();location.reload();}}

// ── SWIPE BACK ────────────────────────────────────────
(function(){
  let sx=0,sy=0,act=false;
  document.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;act=sx<44;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!act)return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=Math.abs(e.changedTouches[0].clientY-sy);
    if(dx>80&&dy<60)goBack();
    act=false;
  },{passive:true});
  document.addEventListener('touchstart',e=>{
    if(document.getElementById('modal').classList.contains('show')&&e.target===document.getElementById('modal'))closeModal();
  },{passive:true});
})();

function goBack(){
  if(document.getElementById('modal').classList.contains('show')){closeModal();return;}
  if(ST.tab==='rc'){go('hoy');return;}
  // If in day detail in sem, close it
  const openDetail=document.querySelector('[id^="detail-"][style*="block"]');
  if(openDetail){openDetail.style.display='none';return;}
  go('hoy');
}

init();
</script>
